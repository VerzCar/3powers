# Local, offline SAST ruleset for the 3Powers `sast` gate.
# Deliberately small and generic — a starting set, not exhaustive. `--config auto`
# is avoided because it needs network/login; a committed ruleset keeps SAST
# deterministic and offline. Teams extend this per project.
rules:
  - id: dangerous-eval
    languages: [python, javascript, typescript]
    severity: WARNING
    message: "Use of eval() executes arbitrary code; avoid it."
    pattern: eval(...)

  - id: dangerous-exec
    languages: [python]
    severity: WARNING
    message: "Use of exec() executes arbitrary code."
    pattern: exec(...)

  - id: subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: "subprocess with shell=True risks command injection; pass an argument list with shell=False."
    pattern: subprocess.$F(..., shell=True, ...)
