# yaml-language-server: $schema=./schema/models.schema.json
# 3Powers per-integration model/label catalog.
#
# Editable DATA, not code: `3pwr init` and `3pwr config roles setup` read this file to offer the
# per-role model choices for the headless integration you use, and to fill each role's
# `model_family` / `model` / `label` consistently. Add or edit entries and the next setup offers
# them — no engine change. This catalog is local and offline; it may lag real provider
# availability, and a model not listed here always remains selectable via free-form entry (BYOK).
#
# Shape per integration:
#   default: <model id offered as the documented default>
#   models:
#     - { model: <id the integration expects>, family: <model family>, label: <friendly label> }
version: 1
integrations:
  claude:
    default: anthropic/claude-opus-4-8
    models:
      - { model: anthropic/claude-opus-4-8, family: anthropic, label: Claude Opus 4.8 }
      - { model: anthropic/claude-sonnet-4-6, family: anthropic, label: Claude Sonnet 4.6 }
      - { model: anthropic/claude-haiku-4-5, family: anthropic, label: Claude Haiku 4.5 }
  codex:
    default: openai/gpt-5.5-codex
    models:
      - { model: openai/gpt-5.5-codex, family: openai, label: GPT 5.5 Codex }
      - { model: openai/gpt-5.5, family: openai, label: GPT 5.5 }
  # Copilot is BYOK — the model, not the backend, decides the family (the diversity precheck).
  copilot:
    default: claude-opus-4.8
    models:
      - { model: claude-opus-4.8, family: anthropic, label: Claude Opus 4.8 }
      - { model: claude-sonnet-4.6, family: anthropic, label: Claude Sonnet 4.6 }
      - { model: gpt-5.5, family: openai, label: GPT 5.5 }
      - { model: gemini-2.5-pro, family: google, label: Gemini 2.5 Pro }
  gemini:
    default: google/gemini-2.5-pro
    models:
      - { model: google/gemini-2.5-pro, family: google, label: Gemini 2.5 Pro }
      - { model: google/gemini-2.5-flash, family: google, label: Gemini 2.5 Flash }
  qwen:
    default: qwen/qwen3-coder
    models:
      - { model: qwen/qwen3-coder, family: qwen, label: Qwen3 Coder }
  # Any-model backends: no curated list — pick free-form; the family is derived from the id.
  opencode: { default: "", models: [] }
  aider: { default: "", models: [] }
  cursor-agent: { default: "", models: [] }
  auggie: { default: "", models: [] }
