# Supported third-party versions 3Powers is known-good against (3PWR-FR-048, 3PWR-NFR-014).
#
# `3pwr deps-check` probes the INSTALLED versions and reports drift from the supported range.
# Policy per component:
#   warn   — surface drift/absence, do not fail (default)
#   block  — fail deps-check on drift/absence
#   ignore — never blocks (still shown)
# This is a PREFLIGHT check, never a verdict gate: installed versions are environment-dependent,
# so keeping them out of the verdict preserves determinism (3PWR-NFR-001). Absent tools are
# reported (like the scanner quarantine, 3PWR-NFR-015), never silently passed. Pin to a stable
# version that works with 3Powers; when an upstream release drifts, this flags it for adaptation.
#
# Exact transitive pins still live in the lockfiles (engine/uv.lock,
# e2e/typescript-orders/project/package-lock.json); this file governs the *supported ranges*.
version: 1

components:
  # Reference agent backend for the native executive (EXEC): the headless coding-agent CLI a role is
  # dispatched to. Optional — 3Powers drives whichever agent a role points at — so `warn`, not `block`.
  - name: claude
    probe: "claude --version"
    supported: ">=1"
    on_drift: warn
  - name: uv
    probe: "uv --version"
    supported: ">=0.4"
    on_drift: warn
  - name: node
    probe: "node --version"
    supported: ">=20"
    known_good: "23.3.0"
    on_drift: warn

  # Supply-chain scanners (language-agnostic core gates; the gate engine quarantines them if
  # absent — 3PWR-NFR-015 — so these stay `warn` here).
  # betterleaks is the preferred secret scanner (maintained Gitleaks successor, same `dir` CLI +
  # JSON schema); gitleaks is the fallback. The gate uses whichever is on PATH, betterleaks first.
  - name: betterleaks
    probe: "betterleaks version"
    supported: ">=1,<2"
    known_good: "1.6.1"
    on_drift: warn
  - name: gitleaks
    probe: "gitleaks version"
    supported: ">=8,<9"
    known_good: "8.30"
    on_drift: warn
  - name: osv-scanner
    probe: "osv-scanner --version"
    supported: ">=2,<3"
    known_good: "2.4"
    on_drift: warn
  - name: semgrep
    probe: "semgrep --version"
    supported: ">=1"
    on_drift: warn

  # Python reference adapter toolchain (probed inside the engine's own uv env).
  - name: ruff
    adapter: python
    probe: "uv run --directory engine ruff --version"
    supported: ">=0.6,<1"
    known_good: "0.15.20"
    on_drift: warn
  - name: mypy
    adapter: python
    probe: "uv run --directory engine mypy --version"
    supported: ">=1.10"
    on_drift: warn
  - name: pytest
    adapter: python
    probe: "uv run --directory engine pytest --version"
    supported: ">=8"
    on_drift: warn

  # TypeScript reference adapter toolchain is pinned by e2e/typescript-orders/project/package-lock.json
  # (Biome 1.9, TypeScript 5.6, Vitest 2.1, Stryker 8.6). `node` above covers its runtime; per-tool
  # probes are project-local (run via `npx` inside the sample) and omitted here to avoid false misses.

  # Go reference adapter toolchain (plan 015). `go` covers format/lint/types/tests; `gcov2lcov`
  # converts the coverprofile to LCOV for diff-coverage; golangci-lint / go-mutesting are optional.
  # All `warn` — a Go project only needs these when it runs the Go adapter (else the gates just fail
  # like any other absent adapter tool). Cross-platform of the shell-guarded gofmt check is residual.
  - name: go
    adapter: go
    probe: "go version"
    supported: ">=1.21"
    on_drift: warn
  - name: gcov2lcov
    adapter: go
    probe: "gcov2lcov -version"
    supported: ">=1"
    on_drift: warn
  - name: golangci-lint
    adapter: go
    probe: "golangci-lint version"
    supported: ">=1.55"
    on_drift: warn
  - name: go-mutesting
    adapter: go
    probe: "go-mutesting --help"
    supported: ">=1"
    on_drift: warn
