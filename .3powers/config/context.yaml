# yaml-language-server: $schema=./schema/context.schema.json
# Context budget for phase sizing — ADVISORY ONLY.
#
# The plan/tasks stages decompose work into phases, each sized so one fresh agent session
# (spec + rules + phase tasks + files in scope) fits inside this budget. A phase whose
# deterministic estimate (~4 bytes/token over the reload set's bytes) exceeds
# the budget gets a warning advising a split; the run always proceeds — no gate, verdict, or
# advance decision ever depends on this file.
version: 1

# The default budget in tokens when no per-model entry matches. ~110k is a practical fill
# indicator for today's common context windows at which model performance stays dependable.
budget_tokens: 110000

# Optional per-model overrides — the key is the role's configured model id (roles.yaml).
# models:
#   anthropic/claude-opus: 150000
#   openai/gpt-5: 90000
