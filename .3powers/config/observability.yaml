# Observability registry — the NFR-instrumentation registry read by `3pwr observe coverage`.
#
# Purpose: declare which of a spec's non-functional requirements (NFRs) have a LIVE check in
# production. The engine is fully offline — it never runs or inspects the production system — so
# it cannot discover this instrumentation itself: it is registered here, and
# `3pwr observe coverage --spec <spec.md>` flags every NFR in the spec that has no registered check
# (the acceptance bar: "a specified NFR has a live check in production"; exit 1 while any NFR is
# uninstrumented). Declaring the instrumentation keeps the coverage gap visible so production
# lessons can be routed back to the spec as new intent.
#
# Schema (version 1): a top-level `checks` list; each entry registers one NFR:
#   - nfr:   the requirement ID exactly as it appears in the spec
#   - check: a human-readable note describing HOW that NFR is verified in production —
#            a probe, an SLO monitor, an alert, a scheduled job.
version: 1

checks:
  - nfr: 3PWR-NFR-001
    check: "determinism canary — re-run the gate suite on a fixed input in CI and diff the verdict byte-for-byte"
  - nfr: 3PWR-NFR-005
    check: "scheduled secret-scan of the published artifacts + repo (the signer's private key must never appear)"
  - nfr: 3PWR-NFR-010
    check: "offline `3pwr verify` on the released ledger in an air-gapped job (reconstructs the chain with no network)"
