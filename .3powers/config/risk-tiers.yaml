# 3Powers risk tiers — the SINGLE source of truth for every gate threshold.
#
# Risk tier is the one knob that drives coverage %, mutation score, model
# diversity, and verification spend (3PWR-FR-032 / 3PWR-FR-049). A gate is NEVER
# satisfied by weakening a threshold here — if a change needs a higher bar, raise
# its tier, never lower the gate.
#
# v0.1 note (spec §17): the `mutation` gate is *wired* but non-blocking; the engine
# reports it as skipped unless `3pwr gate run --mutation` is passed. Full mutation
# enforcement and the remaining scanners arrive in plans 002–003.
version: 1

tiers:
  Cosmetic:        # lint + types only, no ceremony
    diff_coverage: 0
    mutation_score: 0
    model_diversity: false
    gates: [format, lint, types]

  Standard:        # important to correctness; failures visible and recoverable
    diff_coverage: 80
    mutation_score: 0
    model_diversity: true
    gates: [format, lint, types, tests, diff_coverage, spec_conformance]

  High-risk:       # this IS the trust — strictest bar, diversity + mutation required
    diff_coverage: 95
    mutation_score: 70
    model_diversity: true
    gates: [format, lint, types, tests, diff_coverage, mutation, spec_conformance]

# Capability area → tier (spec §4). A change to trust-spine code is held to
# High-risk; the executive/legislative workflow to Standard; docs/CLI polish to
# Cosmetic. 3Powers applies these tiers to its own code (3PWR-A6 / 3PWR-NFR-006).
capabilities:
  trust_spine: High-risk      # oracle independence, gate engine, ledger, provenance, reversibility
  orchestration: Standard     # executive/legislative workflow, agnosticism, config & constitution
  cli_docs: Cosmetic          # CLI ergonomics, human formatting, docs, catalog metadata
