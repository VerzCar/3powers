# Python reference adapter — completed in plan 002.
#
# This is the adapter that lets 3Powers gate its OWN engine code (self-application,
# 3PWR-A6 / 3PWR-NFR-006). Commands are prefixed with `uv run` so each tool executes
# inside the target project's own environment (the equivalent of `npx` for Node).
language: python
detect: ["pyproject.toml"]
test_roots: ["tests", "src"]
property_test_lib: hypothesis

# Toolchain 3Powers drives (3PWR-FR-034/048): a gate's `requires:` names one of these; when the tool
# is missing from the target's uv env the gate can't run, and the engine surfaces an actionable hint —
# "<tool> is not installed — run: <install>". Editable data (3PWR-NFR-007).
toolchain:
  ruff:
    install: "uv add --dev ruff"
    probe: "uv run ruff --version"
  mypy:
    install: "uv add --dev mypy"
    probe: "uv run mypy --version"
  pytest:
    install: "uv add --dev pytest pytest-cov"
    probe: "uv run pytest --version"
  mutmut:
    install: "uv add --dev mutmut"
    probe: "uv run mutmut version"

gates:
  format:
    check_cmd: "uv run ruff format --check ."
    # fix_cmd runs only under `3pwr gate run --auto-fix` (format/lint only, never by default).
    fix_cmd: "uv run ruff format ."
    parser: ruff
    requires: ruff
  lint:
    cmd: "uv run ruff check ."
    fix_cmd: "uv run ruff check --fix ."
    parser: ruff
    requires: ruff
  types:
    cmd: "uv run mypy src"
    parser: mypy
    requires: mypy
  tests:
    cmd: "uv run pytest --cov=src --cov-report=lcov:coverage/lcov.info -q"
    parser: pytest
    requires: pytest
    coverage_format: lcov
    coverage_path: "coverage/lcov.info"
  mutation:
    cmd: "uv run mutmut run"
    score_cmd: "uv run mutmut results --all true"   # --all lists killed too (for scoring)
    parser: mutmut
    requires: mutmut
    tier_min: "High-risk"

# Anti-gaming conformance patterns (HARDN-FR-008/009): a requirement ID traces only when bound
# to a test declaration (the test's name/declaration line or its adjacent docstring), and every
# requirement-bound test needs >=1 assertion. Absent patterns degrade to a visible quarantine,
# never a failure or a silent pass (3PWR-NFR-015).
conformance:
  test_declarations:
    - '^\s*(?:async\s+)?def\s+test_\w+'
    - '^\s*class\s+Test\w+'
  assertion_patterns:
    - '\bassert\b'
    - '\bpytest\.raises\b'
    - '\bself\.assert\w+'
