# Agent backend manifest — Claude Code, headless.
#
# Declarative, like a language adapter: the native executive builds the invocation from these
# fields alone, so adding an agent is "add a manifest" with no engine change.
# The engine makes no model call itself — the dispatched `claude` process does.
# Point it at an enterprise gateway via the environment (ANTHROPIC_BASE_URL, CLAUDE_CODE_USE_BEDROCK,
# CLAUDE_CODE_USE_VERTEX, HTTPS_PROXY, …) — the engine passes the environment through untouched.
agent: claude
family: anthropic            # model family for the diversity precheck
headless: true              # dispatchable with no interactive IDE
command: claude
base_args: ["--permission-mode", "acceptEdits"]
model_flag: "--model"       # coder/oracle model pin is inserted here when configured
prompt_flag: "-p"           # print/headless mode; the assembled stage prompt follows
prompt_via: arg             # arg | stdin
# Session freshness: each `claude -p` invocation starts a NEW session by default; reuse is
# opt-in only (`--continue` / `--resume`), which the engine never emits — no new-session flag needed.
# Usage (advisory): with structured output enabled (usage_mode below), the final JSON result
# carries usage.input_tokens (the non-cached input — cache reads are counted separately in
# cache_read_input_tokens) and usage.output_tokens; the hint sums them. Plain `-p` text output
# (the default) carries no token summary, so the hint reads as unknown until usage_mode is set.
usage:
  strategy: json
  fields: [usage.input_tokens, usage.output_tokens]
# Opt-in structured output: uncomment `usage_mode` to append `usage_mode_args` to every
# invocation, replacing the live text stream with the JSON result object the hint above reads.
# usage_mode: json
usage_mode_args: ["--output-format", "json"]
# Sub-agent model steering (optional, backend-neutral): when a `subagent_models` entry in
# .3powers/config/roles.yaml applies to the dispatched stage, the engine appends the directive below
# so that stage's *sub-agents* run on the cheaper model while the main session keeps its role model.
# `$MODEL` is replaced with the resolved sub-agent model id. Claude Code also honors the
# CLAUDE_CODE_SUBAGENT_MODEL environment variable as an alternative — export it before the run if you
# prefer env delivery. Absent this block (or when no `subagent_models` entry applies), the feature
# no-ops: the dispatch is byte-identical.
subagent_model:
  flag: "--agents"
  arg: '{"cost-optimized": {"description": "Cost-optimized helper for research and fan-out sub-work", "prompt": "You are a focused helper sub-agent.", "model": "$MODEL"}}'
notes: >
  Reference backend. Verified present on PATH in this repo. For enterprise model access set the
  ANTHROPIC_* / CLAUDE_CODE_USE_BEDROCK / CLAUDE_CODE_USE_VERTEX env before running `3pwr run`.
