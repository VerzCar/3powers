# Agent backend manifest — OpenCode, headless.
# MIT, provider-agnostic; `opencode run "<prompt>"` runs non-interactively. Model/provider is chosen in
# OpenCode's own config or via `--model`; the engine passes the environment through.
agent: opencode
family: ""                  # provider-agnostic; set roles.<role>.model for the diversity precheck
headless: true
command: opencode
base_args: ["run"]
model_flag: "--model"
prompt_flag: null           # positional prompt after `run`
prompt_via: arg
# Session freshness: `opencode run` starts a NEW session per invocation; reuse is opt-in only
# (`--session` / `--continue`), which the engine never emits.
# Usage: the run output carries no machine-stable token summary — usage reads as unknown.
notes: "Reference backend. Provider-agnostic; the model family is whatever OpenCode is configured for."
