# yaml-language-server: $schema=./schema/copilot.schema.json
# Agent backend manifest — GitHub Copilot CLI, headless (enterprise Copilot shops).
# Copilot exposes its agent runtime programmatically: `copilot -p "<prompt>"` (non-interactive),
# `--allow-all-tools` (autopilot). Uses the org's Copilot entitlement + Microsoft/GitHub policies; no raw
# model-gateway API is needed because the executive drives the agent, not raw model calls. A hosted async
# path (Copilot coding agent via REST → Actions → PR) fits the same contract as a shape-(b) backend
# and is a future manifest, not this one.
agent: copilot
family: ""                  # depends on the selected model / BYOK; set roles.<role>.model for diversity
headless: true
command: copilot
base_args: ["--allow-all-tools"]
model_flag: "--model"
prompt_flag: "-p"
prompt_via: arg
# Session freshness: each `copilot -p` invocation starts a NEW session by default; reuse is
# opt-in only (`--resume` / `--continue`), which the engine never emits.
# Usage (advisory, never in the verdict): the CLI writes a per-session event log and prints its
# session id on exit as `Resume copilot --resume=<uuid>`. The structured source reads the
# `session.shutdown` event from `~/.copilot/session-state/<uuid>/events.jsonl` — non-cached input
# (input_tokens minus cached_input_tokens) plus output_tokens. The `session.shutdown` schema is
# UNDOCUMENTED and the field paths below are modeled defensively; a schema/path change fails a
# fixture test, never a run (missing field → the source is unresolved → the regex fallback → `—`).
# Version caveat: older builds wrote the log under `~/.copilot/history-session-state/<uuid>/`
# instead of `session-state/`; if a future release moves it again the read simply falls back.
# The drift-proof regex fallback parses the final summary line
#   Tokens ↑ 629.8k (192.8k cached, 46.9k written) • ↓ 5.2k
# summing the non-cached "(… written)" input and the ↓ output (the real consumed count). Copilot
# cost is billed in premium requests / credits, not USD, so no `cost_field` is declared — cost `—`.
usage:
  source: session-file
  session_id_pattern: '--resume=(\S+)'
  path_template: "~/.copilot/session-state/{id}/events.jsonl"
  event_field: type
  event: session.shutdown
  fields: [usage.input_tokens, usage.output_tokens]
  subtract: [usage.cached_input_tokens]
  fallback:
    source: regex
    pattern: 'Tokens[^\n]*?↑[^\n]*?([0-9][0-9.,_kKmM]*)\s+written\)[^\n]*?↓[^\n]*?([0-9][0-9.,_kKmM]*)'
notes: "Reference backend for GitHub Copilot shops. BYOK (OpenAI/Azure/Anthropic keys) via Copilot config."
