# Agent backend manifest — async HOSTED backend, GitHub Copilot coding agent shape.
#
# For enterprises whose only programmatic entry to their agent runtime is an ASYNCHRONOUS, HOSTED run
# (a REST call that starts an Actions run and opens a pull request) rather than a local headless CLI.
# The native executive drives it through the same dispatch contract as a CLI agent: it TRIGGERS the hosted
# run, POLLS to completion, and COLLECTS the produced branch/PR into the working tree — then the same
# in-process deterministic gate suite judges the result identically to a local dispatch.
#
# Provider-neutral by construction: the three steps are ordinary commands with
# {placeholder} substitution — no vendor code lives in the engine. Credentials are inherited from the
# environment (e.g. GITHUB_TOKEN / `gh auth`) and are NEVER read, logged, or stored by the engine;
# point `gh` at your entitlement via the environment.
#
# NOTE: the endpoints below are ILLUSTRATIVE — adapt the api paths / fields to your Copilot coding-agent
# deployment. Placeholders: {prompt} {model} {step} {stage} {run_id}.
agent: copilot-hosted
family: openai              # the diversity precheck family; set to your hosted model's family
headless: true
mode: async-hosted         # selects the hosted backend instead of a local CLI

# 1) Trigger the hosted run. Its stdout's last non-empty line is taken as the run id.
trigger_command:
  ["gh", "api", "-X", "POST", "repos/{owner}/{repo}/copilot/agents",
   "-f", "prompt={prompt}", "--jq", ".id"]

# 2) Poll it. `poll_status_field` reads a JSON field; completed/failed values classify it (case-insensitive).
poll_command: ["gh", "api", "repos/{owner}/{repo}/copilot/agents/{run_id}", "--jq", "{status: .status}"]
poll_status_field: status
completed_values: ["completed", "success"]
failed_values: ["failure", "cancelled", "timed_out"]
poll_interval_s: 15

# 3) Collect the produced changes (the branch/PR) into the working tree, so the verdict stage judges them.
collect_command: ["gh", "pr", "checkout", "{run_id}"]

# Advisory usage hint: the reference poll/collect output carries usage.total_tokens in its final
# JSON — adjust the path (or use `fields:` summed with `subtract:` for a split cached count) to
# match your deployment's fields; unknown when absent; never enters the verdict.
usage:
  strategy: json
  field: usage.total_tokens

notes: >
  Reference HOSTED backend for Copilot-only shops without a local headless CLI. Requires the `gh` CLI
  authenticated to your org. Replace {owner}/{repo} and the api paths to match your deployment.
