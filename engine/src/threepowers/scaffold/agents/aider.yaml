# Agent backend manifest — Aider, headless. Seeded by `3pwr init`.
# Any OpenAI-compatible API, so it slots behind an enterprise gateway (OPENAI_BASE_URL). 3Powers records
# provenance/commits itself, so auto-commit is disabled. `aider --message "<prompt>"` runs one turn.
agent: aider
family: ""
headless: true
command: aider
base_args: ["--yes-always", "--no-auto-commit", "--no-gitignore"]
model_flag: "--model"
prompt_flag: "--message"
prompt_via: arg
# Session freshness: aider persists chat history to .aider.chat.history.md; restoring it is
# opt-in (`--restore-chat-history`, default off) — the explicit no-restore flag makes every
# dispatch a provably clean session regardless of local config.
new_session_args: ["--no-restore-chat-history"]
# Usage (advisory): aider's prose summary is fragile, so usage is read from its structured
# analytics log instead. Aider only writes analytics when asked, and sampling is off by default,
# so the engine forces it: `log_args` injects `--analytics --analytics-log <path>` into the
# invocation (this CHANGES the aider command line), pointing aider at a run-scoped temp file the
# engine then reads back via the `{log}` `path_template` and deletes. Each `message_send` event
# carries `properties.{prompt_tokens, completion_tokens}` (summed across every turn's event) and a
# per-message USD `properties.cost` (the resolver falls back to `properties.total_cost`). The
# analytics schema is undocumented; a missing field → the source is unresolved → `—` (never a run
# failure). No prose regex fallback — the structured log is the only source, else honest-unknown.
usage:
  source: session-file
  log_args: ["--analytics", "--analytics-log", "{log}"]
  path_template: "{log}"
  event_field: event
  event: message_send
  aggregate: sum
  fields: [properties.prompt_tokens, properties.completion_tokens]
  cost_field: [properties.cost, properties.total_cost]
