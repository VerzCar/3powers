# Agent backend manifest — GitHub Copilot CLI, headless. Seeded by `3pwr init`.
# For enterprise Copilot shops: uses the org's Copilot entitlement + Microsoft/GitHub policies. BYOK
# (OpenAI/Azure/Anthropic keys) via Copilot config. `copilot -p "<prompt>"` non-interactive.
agent: copilot
family: ""
headless: true
command: copilot
base_args: ["--allow-all-tools"]
model_flag: "--model"
prompt_flag: "-p"
prompt_via: arg
# Session freshness: each `copilot -p` invocation starts a NEW session by default; reuse is
# opt-in only (`--resume` / `--continue`), which the engine never emits.
# Usage (advisory, never in the verdict): the CLI's final summary line reads
#   Tokens ↑ 629.8k (29.5k written) • ↓ 9.2k
# — ↑ is total input INCLUDING cache reads; "(… written)" is the non-cached input actually
# written; ↓ is output. The two capture groups (written + output) are summed = the real
# consumed count.
usage:
  strategy: regex
  pattern: 'Tokens ↑[^\n]*\(([0-9.,_kKmM]+) written\)[^\n]*↓\s*([0-9.,_kKmM]+)'
