# Agent backend manifest — GitHub Copilot CLI, headless. Seeded by `3pwr init`.
# For enterprise Copilot shops: uses the org's Copilot entitlement + Microsoft/GitHub policies. BYOK
# (OpenAI/Azure/Anthropic keys) via Copilot config. `copilot -p "<prompt>"` non-interactive.
agent: copilot
family: ""
headless: true
command: copilot
base_args: ["--allow-all-tools"]
model_flag: "--model"
prompt_flag: "-p"
prompt_via: arg
# Session freshness: each `copilot -p` invocation starts a NEW session by default; reuse is
# opt-in only (`--resume` / `--continue`), which the engine never emits.
# Usage: the non-interactive output carries no token summary — usage reads as unknown.
