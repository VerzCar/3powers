# yaml-language-server: $schema=./schema/claude.schema.json
# Agent backend manifest — Claude Code, headless. Seeded by `3pwr init`.
# The engine makes no model call itself; the dispatched `claude` process does. Point it at
# an enterprise gateway via env (ANTHROPIC_BASE_URL, CLAUDE_CODE_USE_BEDROCK/_VERTEX, HTTPS_PROXY) — the
# engine passes the environment through untouched.
agent: claude
family: anthropic
headless: true
command: claude
base_args: ["--permission-mode", "acceptEdits"]
model_flag: "--model"
prompt_flag: "-p"
prompt_via: arg
# Session freshness: each `claude -p` invocation starts a NEW session by default; reuse is
# opt-in only (`--continue` / `--resume`), which the engine never emits — no new-session flag needed.
# Usage (advisory): with structured output enabled (usage_mode below), the final `result` event
# carries a `modelUsage` map (model id -> that model's usage) and a `total_cost_usd`. The token
# total is the WHOLE-TREE sum of input+output across every entry of `modelUsage`, so sub-agents
# running on a different model (e.g. a cost-optimized helper) are counted too — the top-level
# `usage` block omits them. `total_cost_usd` already rolls up the whole tree. When an older Claude
# CLI emits no `modelUsage`, the hints fall back to the flat top-level `usage.input_tokens` +
# `usage.output_tokens` (cache reads are counted separately in cache_read_input_tokens and excluded
# both ways). Plain `-p` text output carries no token summary, so the hints read as unknown until
# usage_mode is set.
usage:
  source: inline-json
  # Whole-tree token total: sum input+output across every model in the result event's `modelUsage`
  # map (sub-agents included). NOTE: the inner camelCase field names below are modelled from a
  # captured sample and pending real-output re-verification; a wrong path degrades to the flat
  # `fields` fallback, never a crash.
  per_model_field: modelUsage
  per_model_tokens: [inputTokens, outputTokens]
  # Older-CLI fallback (no `modelUsage`): the flat top-level per-run usage block.
  fields: [usage.input_tokens, usage.output_tokens]
  cost_field: total_cost_usd
# Structured output for native token/cost accounting WITHOUT killing the live stream:
# `usage_mode` appends `usage_mode_args` below. `--output-format stream-json` (with the required
# `--verbose`) emits ONE JSON event per line, so the dispatch/echo path renders the assistant text
# deltas live AND the final `result` event carries the usage/cost the hints read. This is
# deliberately NOT plain `--output-format json`, which buffers a single end-of-run blob and
# destroys the live conversation. (Pre-v2.1.208 Claude Code truncated the stream-json final line;
# the persisted transcript is unaffected regardless — upgrade to restore native cost/usage.)
usage_mode: json
usage_mode_args: ["--output-format", "stream-json", "--verbose"]
# Sub-agent model steering (optional, backend-neutral): when a `subagent_models` entry in
# .3powers/config/roles.yaml applies to the dispatched stage, the engine appends the directive below
# so that stage's *sub-agents* run on the cheaper model while the main session keeps its role model.
# `$MODEL` is replaced with the resolved sub-agent model id. Claude Code also honors the
# CLAUDE_CODE_SUBAGENT_MODEL environment variable as an alternative — export it before the run if you
# prefer env delivery. Absent this block (or when no `subagent_models` entry applies), the feature
# no-ops: the dispatch is byte-identical.
subagent_model:
  flag: "--agents"
  arg: '{"cost-optimized": {"description": "Cost-optimized helper for research and fan-out sub-work", "prompt": "You are a focused helper sub-agent.", "model": "$MODEL"}}'
