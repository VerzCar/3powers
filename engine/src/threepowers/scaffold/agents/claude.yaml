# Agent backend manifest — Claude Code, headless. Seeded by `3pwr init`.
# The engine makes no model call itself; the dispatched `claude` process does. Point it at
# an enterprise gateway via env (ANTHROPIC_BASE_URL, CLAUDE_CODE_USE_BEDROCK/_VERTEX, HTTPS_PROXY) — the
# engine passes the environment through untouched.
agent: claude
family: anthropic
headless: true
command: claude
base_args: ["--permission-mode", "acceptEdits"]
model_flag: "--model"
prompt_flag: "-p"
prompt_via: arg
