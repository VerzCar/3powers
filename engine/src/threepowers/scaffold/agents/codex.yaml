# Agent backend manifest — OpenAI Codex CLI, headless. Seeded by `3pwr init`.
# Route model access via OPENAI_BASE_URL / OPENAI_API_KEY or an OpenAI-compatible gateway — the
# engine passes the environment through untouched.
agent: codex
family: openai
headless: true
command: codex
base_args: ["exec", "--full-auto"]
model_flag: "--model"
prompt_flag: null
prompt_via: arg
