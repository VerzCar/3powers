# Agent backend manifest — OpenAI Codex CLI, headless. Seeded by `3pwr init`.
# Route model access via OPENAI_BASE_URL / OPENAI_API_KEY or an OpenAI-compatible gateway — the
# engine passes the environment through untouched.
agent: codex
family: openai
headless: true
command: codex
base_args: ["exec", "--full-auto"]
model_flag: "--model"
prompt_flag: null
prompt_via: arg
# Session freshness: `codex exec` starts a NEW non-interactive session per invocation; reuse is
# opt-in only (`codex exec resume`), which the engine never emits.
# Usage (advisory, never in the verdict): the exec summary prints "tokens used: <n>" — a
# cumulative TOTAL that includes cached input, extracted as-is (documented over-count). For the
# real non-cached count, opt in to structured output: uncomment `usage_mode` and swap in the
# json hint below — the JSONL `token_count` event separates cached input.
usage:
  strategy: regex
  pattern: 'tokens used[:\s]+([0-9][0-9,]*)'
# usage_mode: json
usage_mode_args: ["--json"]
# usage:
#   strategy: json
#   fields: [input_tokens, output_tokens]
#   subtract: [cached_input_tokens]
