# Agent backend manifest — OpenAI Codex CLI, headless. Seeded by `3pwr init`.
# Route model access via OPENAI_BASE_URL / OPENAI_API_KEY or an OpenAI-compatible gateway — the
# engine passes the environment through untouched.
agent: codex
family: openai
headless: true
command: codex
base_args: ["exec", "--full-auto"]
model_flag: "--model"
prompt_flag: null
prompt_via: arg
# Session freshness: `codex exec` starts a NEW non-interactive session per invocation; reuse is
# opt-in only (`codex exec resume`), which the engine never emits.
# Usage (advisory, never in the verdict): `codex exec --json` emits a JSONL event stream whose
# final `turn.completed` event carries a `usage` object. Read structured-first as non-cached input
# + output (`usage.input_tokens` + `usage.output_tokens`, minus `usage.cached_input_tokens` when
# present). The prose "tokens used: <n>" summary survives only as a declared regex FALLBACK — used
# when the JSON is absent, never ahead of it.
usage:
  source: inline-json
  fields: [usage.input_tokens, usage.output_tokens]
  subtract: [usage.cached_input_tokens]
  pattern: 'tokens used[:\s]+([0-9][0-9,]*)'   # declared fallback: fires only when no JSON usage
usage_mode: json
usage_mode_args: ["--json"]
