# Go reference adapter (plan 015) — the third language, proving the adapter contract is truly
# language-agnostic (3PWR-FR-027 / 3PWR-NFR-007): adding a language is "add a manifest", no core change.
#
# Most gates run with just the base Go toolchain (`go`). Diff-coverage reuses the core's LCOV path
# (3PWR-FR-029) unchanged — `go test` writes a Go coverprofile, so the tests gate converts it to LCOV
# with `gcov2lcov` in a shell pipeline (opt-in `shell: true`; see the adapter CONTRACT). golangci-lint
# and go-mutesting are optional richer tools. Exact flags to confirm against an installed toolchain.
language: go
detect: ["go.mod"]
test_roots: ["."]
property_test_lib: rapid

# Toolchain 3Powers drives (3PWR-FR-034/048): a gate's `requires:` names one of these; when the tool
# is absent the gate can't run, and the engine surfaces an actionable hint. `go` covers
# format/lint/types; the tests gate also needs `gcov2lcov` (to emit LCOV), mutation `go-mutesting`.
toolchain:
  go:
    install: "install the Go toolchain — https://go.dev/dl/"
    probe: "go version"
  gcov2lcov:
    install: "go install github.com/jandelgado/gcov2lcov@latest"
    probe: "gcov2lcov -version"
  go-mutesting:
    install: "go install github.com/avito-tech/go-mutesting/cmd/go-mutesting@latest"
    probe: "go-mutesting --help"

gates:
  format:
    # gofmt -l lists unformatted files but exits 0; the shell guard makes "any unformatted" a failure.
    check_cmd: 'test -z "$(gofmt -l .)"'
    # fix_cmd runs only under `3pwr gate run --auto-fix` (format/lint only, never by default).
    fix_cmd: "gofmt -w ."
    shell: true
    parser: gofmt
    requires: go
  lint:
    cmd: "go vet ./..."
    parser: govet
    requires: go
  types:
    cmd: "go build ./..."
    parser: gobuild
    requires: go
  tests:
    # Emit LCOV so the core's diff-coverage (3PWR-FR-029) works unchanged across languages.
    cmd: "go test -covermode=atomic -coverprofile=cover.out ./... && gcov2lcov -infile cover.out -outfile coverage/lcov.info"
    shell: true
    parser: gotest
    requires: gcov2lcov
    coverage_format: lcov
    coverage_path: "coverage/lcov.info"
  mutation:
    cmd: "go-mutesting ./..."
    parser: go-mutesting
    requires: go-mutesting
    tier_min: "High-risk"

# Anti-gaming conformance patterns (HARDN-FR-008/009): a requirement ID traces only when bound
# to a test declaration (func TestX / t.Run title), and every requirement-bound test needs >=1
# assertion. Absent patterns degrade to a visible quarantine (3PWR-NFR-015).
conformance:
  test_declarations:
    - '^\s*func\s+Test\w+'
    - '\bt\.Run\s*\('
  assertion_patterns:
    - '\bt\.(?:Error|Errorf|Fatal|Fatalf|Fail|FailNow)\b'
    - '\brequire\.\w+\('
    - '\bassert\.\w+\('
