# TypeScript reference adapter (built + exercised in plan 001).
#
# Biome covers BOTH formatting and linting via its `ci` check command (no writes,
# non-zero exit on any issue); we map both gates to it for a unified, fast floor.
# Vitest emits LCOV which the core uses for diff-coverage. Stryker is wired for the
# mutation gate but stays non-blocking until plan 002.
language: typescript
detect: ["package.json", "tsconfig.json"]
test_roots: ["tests", "src"]
property_test_lib: fast-check

# Toolchain 3Powers drives (3PWR-FR-034/048): a gate's `requires:` names one of these; when the tool
# is absent the gate can't run, and the engine turns the raw `npx --no-install` error into an
# actionable hint — "<tool> is not installed — run: <install>". `install` is the fix command; `probe`
# is an optional version check. Editable data, like the rest of the adapter (3PWR-NFR-007).
toolchain:
  biome:
    install: "npm i -D @biomejs/biome"
    probe: "npx --no-install @biomejs/biome --version"
  tsc:
    install: "npm i -D typescript"
    probe: "npx --no-install tsc --version"
  vitest:
    install: "npm i -D vitest @vitest/coverage-v8"
    probe: "npx --no-install vitest --version"
  stryker:
    install: "npm i -D @stryker-mutator/core @stryker-mutator/vitest-runner"
    probe: "npx --no-install stryker --version"

gates:
  format:
    check_cmd: "npx --no-install @biomejs/biome ci ."
    # fix_cmd runs only under `3pwr gate run --auto-fix` (format/lint only, never by default).
    fix_cmd: "npx --no-install @biomejs/biome check --write ."
    parser: biome
    requires: biome
  lint:
    cmd: "npx --no-install @biomejs/biome ci ."
    fix_cmd: "npx --no-install @biomejs/biome check --write ."
    parser: biome
    requires: biome
  types:
    cmd: "npx --no-install tsc --noEmit"
    parser: tsc
    requires: tsc
  tests:
    cmd: "npx --no-install vitest run --coverage"
    parser: vitest
    requires: vitest
    coverage_format: lcov
    coverage_path: "coverage/lcov.info"
  mutation:
    cmd: "npx --no-install stryker run"
    parser: stryker
    requires: stryker
    report_path: "reports/mutation/mutation.json"   # Stryker JSON report for scoring
    tier_min: "High-risk"

  # Optional design oracles (3PWR-FR-009) — run ONLY when work-kind inference tags a change `design`
  # (3PWR-FR-058). These are illustrative TS wirings; when the tool isn't installed (or the project
  # doesn't define the script) the gate is quarantined, never silently passed (3PWR-NFR-015).
  visual_regression:
    cmd: "npx --no-install playwright test --grep @visual"
    parser: playwright
  a11y_scan:
    cmd: "npx --no-install axe ./dist"
    parser: axe
  contract_check:
    cmd: "npx --no-install oasdiff breaking base.yaml revision.yaml"
    parser: oasdiff
  component_contract:
    cmd: "npx --no-install pact-verifier"
    parser: pact

# Anti-gaming conformance patterns (HARDN-FR-008/009): a requirement ID traces only when bound
# to a test declaration title (describe/it/test), and every requirement-bound test needs >=1
# assertion. Absent patterns degrade to a visible quarantine (3PWR-NFR-015).
conformance:
  test_declarations:
    - '\b(?:describe|it|test)(?:\.\w+)?\s*\('
  assertion_patterns:
    - '\bexpect\s*\('
    - '\bassert\w*\s*\('
    - '\.toThrow'
