# TypeScript reference adapter (built + exercised in plan 001).
#
# Biome is split by concern: the `format` gate runs `biome format` (formatter only)
# and the `lint` gate runs `biome lint` (linter only) — each gate checks exactly what
# its name says, and lint findings never fail the format gate (no double-linting).
# Both commands write nothing and exit non-zero on any issue.
#
# These biome gates are the adapter's LAST-RESORT DEFAULT. Auto-detection overrides them with a
# project's own native tooling whenever it is configured — prettier or ESLint for `format`, ESLint
# for `lint` — so a project that already formats/lints with its own tools keeps using them and biome
# is never imposed or installed. Biome runs only when a project configures no formatter/linter at all.
# Vitest emits LCOV which the core uses for diff-coverage. Stryker is wired for the
# mutation gate but stays non-blocking until plan 002.
language: typescript
detect: ["package.json", "tsconfig.json"]
test_roots: ["tests", "src"]
property_test_lib: fast-check

# Toolchain 3Powers drives: a gate's `requires:` names one of these; when the tool
# is absent the gate can't run, and the engine turns the raw `npx --no-install` error into an
# actionable hint — "<tool> is not installed — run: <install>". `install` is the fix command; `probe`
# is an optional version check. Editable data, like the rest of the adapter.
toolchain:
  biome:
    install: "npm i -D @biomejs/biome"
    probe: "npx --no-install @biomejs/biome --version"
  tsc:
    install: "npm i -D typescript"
    probe: "npx --no-install tsc --version"
  vitest:
    install: "npm i -D vitest @vitest/coverage-v8"
    probe: "npx --no-install vitest --version"
  stryker:
    install: "npm i -D @stryker-mutator/core @stryker-mutator/vitest-runner"
    probe: "npx --no-install stryker --version"

gates:
  format:
    check_cmd: "npx --no-install @biomejs/biome format ."
    # fix_cmd runs only under `3pwr gate run --auto-fix` (format/lint only, never by default).
    fix_cmd: "npx --no-install @biomejs/biome format --write ."
    parser: biome
    requires: biome
  lint:
    cmd: "npx --no-install @biomejs/biome lint ."
    fix_cmd: "npx --no-install @biomejs/biome lint --write ."
    parser: biome
    requires: biome
  types:
    cmd: "npx --no-install tsc --noEmit"
    parser: tsc
    requires: tsc
  tests:
    cmd: "npx --no-install vitest run --coverage"
    parser: vitest
    requires: vitest
    coverage_format: lcov
    coverage_path: "coverage/lcov.info"
  mutation:
    cmd: "npx --no-install stryker run"
    parser: stryker
    requires: stryker
    report_path: "reports/mutation/mutation.json"   # Stryker JSON report for scoring
    tier_min: "High-risk"

  # Optional design oracles — run ONLY when work-kind inference tags a change `design`.
  # These are illustrative TS wirings; when the tool isn't installed (or the project
  # doesn't define the script) the gate is quarantined, never silently passed.
  visual_regression:
    cmd: "npx --no-install playwright test --grep @visual"
    parser: playwright
  a11y_scan:
    cmd: "npx --no-install axe ./dist"
    parser: axe
  contract_check:
    cmd: "npx --no-install oasdiff breaking base.yaml revision.yaml"
    parser: oasdiff
  component_contract:
    cmd: "npx --no-install pact-verifier"
    parser: pact

# Anti-gaming conformance patterns: a requirement ID traces only when bound
# to a test declaration title (describe/it/test), and every requirement-bound test needs >=1
# assertion. Absent patterns degrade to a visible quarantine.
conformance:
  test_declarations:
    - '\b(?:describe|it|test)(?:\.\w+)?\s*\('
  assertion_patterns:
    - '\bexpect\s*\('
    - '\bassert\w*\s*\('
    - '\.toThrow'
