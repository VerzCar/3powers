schema_version: "1.0"

# 3Powers judiciary extension for Spec Kit — installed/rendered by `3pwr init --with-speckit`
# (INITX-FR-005/008). Provider-agnostic: Spec Kit renders these commands into whichever integration the
# project was initialized with. The judiciary command carries a model pin rendered from roles.yaml at
# install time — no hardcoded model literal survives (INITX-FR-008).
extension:
  id: 3powers
  name: "3Powers Judiciary"
  version: "0.1.0"
  description: "Adds the 3Powers judiciary to Spec Kit — an independent oracle, a deterministic gate suite, and a signed verdict ledger with local enforcement, plus test-first authoring and per-stage auto-commit (3PWR-A1/A3, INITX-FR-005/006)."
  author: 3Powers
  repository: https://github.com/3powers/3powers
  license: Apache-2.0

requires:
  speckit_version: "{{spec_kit_range}}"

provides:
  commands:
    - name: 3pwr.oracle
      file: commands/3pwr.oracle.md
      description: "Phase A — author the independent oracle from a sealed, spec-only bundle; different model family than the coder (3PWR-FR-020/021/022/062, A3)."
    - name: 3pwr.verify
      file: commands/3pwr.verify.md
      description: "Run the deterministic gate suite and verify the signed verdict ledger (3PWR-FR-026/040)."
    - name: 3pwr.advance
      file: commands/3pwr.advance.md
      description: "Local, CI-independent enforcement — advance only when gates are green, the ledger verifies, and a human sign-off is present (3PWR-FR-041/042)."
    - name: 3pwr.tests-gaps
      file: commands/3pwr.tests-gaps.md
      description: "Read-only judiciary dry-run: list spec requirements with no linked test, mirroring the spec_conformance gate (INITX-FR-007). CI-friendly."

# Wire the judiciary into the SDD lifecycle. The oracle/tests are authored immediately AFTER the plan so
# Phase A precedes Phase B (test-first, 3PWR-FR-062 / INITX-FR-005); verification runs after implement.
# Per-stage auto-commit (INITX-FR-006) is applied by the lifecycle workflow calling `3pwr commit-stage
# --spec-id <ID> --stage <stage>` after each successful stage — one commit per stage, tagged with the
# spec id; a failed stage yields no commit. Toggle via .3powers/config/onboarding.yaml (defaults.auto_commit).
hooks:
  after_plan:
    command: 3pwr.oracle
    optional: true
    description: "Author the independent oracle/tests before implementation — test-first (Phase A precedes Phase B, 3PWR-FR-062 / INITX-FR-005)."
  after_tasks:
    command: 3pwr.tests-gaps
    optional: true
    description: "Judiciary dry-run: confirm every requirement has a linked test before implementation (INITX-FR-007)."
  after_implement:
    command: 3pwr.verify
    optional: true
    description: "Run the judiciary gate suite and verify the ledger after implementation."

tags:
  - "judiciary"
  - "gates"
  - "trust"
  - "spec-driven"
  - "test-first"
