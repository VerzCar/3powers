schema_version: "1.0"
workflow:
  id: "3powers-lifecycle"
  name: "3Powers Full Lifecycle"
  version: "0.1.0"
  author: "3Powers"
  description: >
    The whole eight-stage loop, driven by `3pwr run` (§6; playbook §26, automated): intent → spec →
    clarify → HUMAN spec approval (3PWR-FR-006) → plan → tasks → independent oracle (Phase A) →
    implement (Phase B) → deterministic gates → HUMAN sign-off on evidence + residual (3PWR-FR-037) →
    advance/ship. `3pwr run` streams progress and, in `auto` mode, auto-continues past the intermediate
    review gates while ALWAYS stopping at the two spec-mandated human gates (review-spec, signoff).
    3Powers reuses Spec Kit's `workflow run` dispatch (A1) — the engine makes no model calls (A3).

requires:
  speckit_version: ">=0.11,<0.12"
  integrations:
    any: ["claude", "copilot", "gemini", "codex", "opencode"]

inputs:
  intent:
    type: string
    required: true
    prompt: "Describe what you want to build (the human's one-paragraph intent)"
  mode:
    type: string
    default: "auto"
    enum: ["auto", "commit"]
    prompt: "auto = stop only at the two human gates; commit = review at every stage"
  integration:
    type: string
    default: "auto"
    prompt: "Executive integration (coder). The oracle step should differ in family (3PWR-FR-022)."

steps:
  # ---- Legislative: author the law, human approves it (Stage 1–2) ----
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.intent }}"
  - id: clarify
    command: speckit.clarify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.intent }}"
  - id: review-spec
    type: gate
    message: "MANDATORY (3PWR-FR-006): a human approves the spec before implementation begins."
    options: [approve, reject]
    on_reject: abort

  # ---- Executive: plan + decompose (Stage 3) ----
  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.intent }}"
  - id: review-plan
    type: gate
    message: "Review the plan (intermediate gate — auto mode continues; commit mode stops here)."
    options: [approve, reject]
    on_reject: abort
  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.intent }}"

  # ---- Judiciary Phase A: the independent oracle, authored from the spec only ----
  - id: oracle
    command: 3pwr.oracle
    integration: "{{ inputs.integration }}"
    input:
      args: >
        Author the independent oracle for this spec (Phase A) — a different model family than the
        coder (3PWR-FR-022; use `3pwr oracle dispatch` for headless, read-path-isolated authoring,
        3PWR-FR-021/A3). Derive from the acceptance criteria only; do not read the implementation.

  # ---- Executive Phase B: implement against the oracle ----
  - id: implement
    command: speckit.implement
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.intent }}"

  # ---- Judiciary: deterministic gates + verify (Stage 5) ----
  - id: verify
    command: 3pwr.verify
    integration: "{{ inputs.integration }}"
    input:
      args: "Run the deterministic gate suite and verify the signed ledger (3PWR-FR-026/040)."
  - id: review-verify
    type: gate
    message: "Review the verdict + residual (intermediate gate — auto mode continues; commit stops)."
    options: [approve, reject]
    on_reject: abort

  # ---- Judiciary: the human sign-off, then ship (Stage 6–7) ----
  - id: signoff
    type: gate
    message: "MANDATORY (3PWR-FR-037): a human signs off on the evidence + residual before advancing."
    options: [approve, reject]
    on_reject: abort
  - id: advance
    command: 3pwr.advance
    integration: "{{ inputs.integration }}"
    input:
      args: "Advance to ship — refuses unless gates green, ledger verifies, sign-off present (FR-041/042)."
