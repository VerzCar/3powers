schema_version: "1.0"

extension:
  id: 3powers
  name: "3Powers Judiciary"
  version: "0.1.0"
  description: "Adds the 3Powers judiciary to Spec Kit — an independent oracle, a deterministic gate suite, and a signed verdict ledger with local enforcement. Provider-agnostic: runs under any integration Spec Kit can dispatch (3PWR-A1/A3)."
  author: 3Powers
  repository: https://github.com/3powers/3powers
  license: Apache-2.0

requires:
  # Known-good Spec Kit range — kept in sync with .3powers/config/dependencies.yaml and checked by
  # `3pwr deps-check`. 3Powers reuses Spec Kit's integration registry + headless dispatch (A1/A3)
  # rather than a Copilot-specific harness.
  speckit_version: ">=0.11,<0.12"

# Provider-agnostic: no integration is hardcoded. Spec Kit renders these commands into whichever
# integration the project was initialized with (copilot, claude, gemini, codex, …) — the same
# `integration: "auto"` model used by .specify/workflows/speckit/workflow.yml.
provides:
  commands:
    - name: 3pwr.oracle
      file: commands/3pwr.oracle.md
      description: "Phase A — author the independent oracle from a sealed, spec-only bundle; different model family than the coder (3PWR-FR-020/021/022/062)."
    - name: 3pwr.verify
      file: commands/3pwr.verify.md
      description: "Run the deterministic gate suite and verify the signed verdict ledger (3PWR-FR-026/040)."
    - name: 3pwr.advance
      file: commands/3pwr.advance.md
      description: "Local, CI-independent enforcement — advance a stage only when gates are green, the ledger verifies, and a human sign-off is present (3PWR-FR-041/042)."

# Wire the judiciary into the SDD lifecycle. Phase A (oracle) precedes implementation; verification
# runs after it (3PWR-FR-062). Hooks are optional — the human stays in the loop.
hooks:
  after_tasks:
    command: 3pwr.oracle
    optional: true
    description: "Author the independent oracle before implementation (Phase A precedes Phase B, 3PWR-FR-062)."
  after_implement:
    command: 3pwr.verify
    optional: true
    description: "Run the judiciary gate suite and verify the ledger after implementation."

tags:
  - "judiciary"
  - "gates"
  - "trust"
  - "spec-driven"
