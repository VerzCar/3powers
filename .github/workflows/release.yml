# Publishes a tagged release of the engine to PyPI via tokenless Trusted Publishing (OIDC).
#
# Trigger: pushing a version tag (`v*`). The build job produces the sdist + wheel from engine/,
# and the publish job uploads them to PyPI using GitHub's OIDC identity — there is NO stored API
# token anywhere. A guard fails fast if the pushed tag does not match the packaged version, and
# both jobs run only on the upstream repository (never on a fork).
#
# Prerequisite (one-time, maintainer): register the PyPI Trusted Publisher for the project
# `3powers` — repository `VerzCar/3powers`, workflow `release.yml`, environment `pypi`.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build — sdist + wheel
    if: github.repository == 'VerzCar/3powers'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify the pushed tag matches the packaged version
        working-directory: engine
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python3 -c "import tomllib,pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          echo "pushed tag: ${tag} · packaged version: ${pkg}"
          if [ "${tag}" != "${pkg}" ]; then
            echo "::error::pushed tag (${tag}) does not match the packaged version (${pkg}); refusing to publish"
            exit 1
          fi

      - name: Build the distribution (sdist + wheel)
        working-directory: engine
        run: uv build

      - name: Upload the built distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: engine/dist/*
          if-no-files-found: error

  publish:
    name: publish — PyPI Trusted Publishing (OIDC)
    needs: build
    if: github.repository == 'VerzCar/3powers'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/3powers/
    permissions:
      id-token: write # mint the short-lived OIDC token PyPI trusts — no stored secret
    steps:
      - name: Download the built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
