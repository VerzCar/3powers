ent family than the coder · When: Stage 6, after the gates are green<\u002Fp>\n        <blockquote style=\"margin:0;border-left:3px solid #A14242;background:#F6EEEC;padding:9px 14px;font-size:12px;line-height:1.5;color:#3A332C;border-radius:0 4px 4px 0;\">The automated gates already passed, so do not re-report lint, type, coverage, or known security-scanner findings. Review only what gates cannot catch: does the change match the specification’s intent, did scope creep in beyond the requirements, is the architecture a good fit, are there subtle business-logic errors, and are there security design problems as opposed to mechanical findings. Cite the requirement ID for each point. If you find an intent gap that the spec never stated, flag it as a new requirement rather than a code fix. Change: <span class=\"lab\">&lt;PASTE DIFF&gt;<\u002Fspan>. Specification: <span class=\"lab\">&lt;PASTE SPEC&gt;<\u002Fspan>.<\u002Fblockquote>\n        <p class=\"body\" style=\"font-size:11.5px;color:#6E655A;margin-top:6px;\"><strong>Expected output:<\u002Fstrong> a short list of residual findings tied to requirement IDs, with intent gaps marked for the spec. <strong>Porting note:<\u002Fstrong> a review sub-agent in Copilot, model pinned to a different family.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 class=\"h3\" style=\"font-size:13.5px;\">H.5 &nbsp;Mutation-survivor triage<\u002Fh3>\n        <p class=\"cap\" style=\"margin:1px 0 6px;color:#7B1818;\">Branch: Judiciary · Model: any · When: Stage 5, when mutation testing leaves survivors<\u002Fp>\n        <blockquote style=\"margin:0;border-left:3px solid #A14242;background:#F6EEEC;padding:9px 14px;font-size:12px;line-height:1.5;color:#3A332C;border-radius:0 4px 4px 0;\">Each item below is a surviving mutant: a change to the code that the tests did not catch. For each one, decide whether it is a real gap, meaning the tests should have caught it, in which case write the missing assertion, or an equivalent mutant, meaning the change does not alter observable behavior, in which case explain why. Do not weaken any test to make a mutant disappear. Survivors: <span class=\"lab\">&lt;PASTE SURVIVORS&gt;<\u002Fspan>.<\u002Fblockquote>\n        <p class=\"body\" style=\"font-size:11.5px;color:#6E655A;margin-top:6px;\"><strong>Expected output:<\u002Fstrong> per mutant, either a new assertion or a justified equivalence.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 class=\"h3\" style=\"font-size:13.5px;\">H.6 &nbsp;Brownfield spec extraction<\u002Fh3>\n        <p class=\"cap\" style=\"margin:1px 0 6px;color:#9C7A2E;\">Branch: Legislative · Model: strong reasoning · When: Stage Zero, for a module you are about to change<\u002Fp>\n        <blockquote style=\"margin:0;border-left:3px solid #B98E4C;background:#F6F2E8;padding:9px 14px;font-size:12px;line-height:1.5;color:#3A332C;border-radius:0 4px 4px 0;\">Read the module below and reconstruct the specification it currently satisfies, in EARS form with IDed, measurable requirements. Capture the behavior as it is, including edge cases you can infer from the code, and mark anything ambiguous as a question rather than a guess. This is documentation of current behavior, not a proposal to change it. Module: <span class=\"lab\">&lt;PASTE CODE&gt;<\u002Fspan>.<\u002Fblockquote>\n        <p class=\"body\" style=\"font-size:11.5px;color:#6E655A;margin-top:6px;\"><strong>Expected output:<\u002Fstrong> a spec describing current behavior, with open questions flagged. <strong>Porting note:<\u002Fstrong> pair this with characterization tests (see <a href=\"#stage-zero\">Stage Zero<\u002Fa>) so the extracted spec has an oracle before you change the code.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix H<\u002Fspan><span class=\"pg\">52<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 53 · APPENDIX I (1) ============ -->\n<div class=\"page\" id=\"appendix-i\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:34px;\">APPENDIX I<\u002Fdiv>\n    <h1 class=\"h1 sm\">The Judiciary Preset &amp; Extension<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:12px;\">The Orchestration Loop describes the test author as a separate agent on a different model. This appendix is the concrete way to enforce that inside Spec Kit, so the split is part of the tooling rather than a convention people remember to follow. It ships as a drop-in bundle of two pieces — a <strong>preset<\u002Fstrong> (template overrides) and an <strong>extension<\u002Fstrong> (two new slash commands) — because Spec Kit draws a hard line between <em>customising<\u002Fem> existing artefacts and <em>adding<\u002Fem> new ones. No third-party service, no public catalog; install steps are in <a href=\"#appendix-k\">§I.5<\u002Fa>.<\u002Fp>\n\n    <div class=\"sec\" style=\"margin-top:13px;\">\n      <div class=\"seclabel\">I.1 &nbsp;WHY IT EXISTS<\u002Fdiv>\n      <p class=\"body\" style=\"font-size:12.5px;\">Vanilla Spec Kit ships eight commands: <span class=\"chip\">constitution<\u002Fspan>, <span class=\"chip\">specify<\u002Fspan>, <span class=\"chip\">clarify<\u002Fspan>, <span class=\"chip\">plan<\u002Fspan>, <span class=\"chip\">checklist<\u002Fspan>, <span class=\"chip\">tasks<\u002Fspan>, <span class=\"chip\">analyze<\u002Fspan>, <span class=\"chip\">implement<\u002Fspan>. Tests inside that flow are optional, and when they are generated, the same agent that writes the code writes them, from the same context. That is the separation-of-powers collapse the playbook exists to prevent: the legislative spec, the executive code, and the judicial tests fuse into one mind, so a misreading of the spec lands identically in the code and in the tests. The preset adds a judiciary branch that authors the oracle tests from <span class=\"chip\">spec.md<\u002Fspan> only, on a different model family than the coder.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:13px;\">\n      <div class=\"seclabel\">I.2 &nbsp;WHAT IT ADDS<\u002Fdiv>\n      <p class=\"body\" style=\"font-size:12.5px;margin-bottom:7px;\">The <strong>preset<\u002Fstrong> overrides two templates; the <strong>extension<\u002Fstrong> adds two commands that author two new artefacts:<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:6px;\">\n        <p class=\"body mkrow\" style=\"font-size:12px;\"><span class=\"mk\"><span class=\"badge practice\">PRESET<\u002Fspan><\u002Fspan>A wrapped <span class=\"chip\">spec-template.md<\u002Fspan> that makes the playbook’s soft expectations mandatory: a Risk Tier field, EARS discipline, a Non-goals section, and a measurable acceptance-criteria block per requirement.<\u002Fp>\n        <p class=\"body mkrow\" style=\"font-size:12px;\"><span class=\"mk\"><span class=\"badge practice\">PRESET<\u002Fspan><\u002Fspan>A new <span class=\"chip\">tests-template.md<\u002Fspan> that defines the shape of <span class=\"chip\">tests.md<\u002Fspan>: a coverage summary, one section per <span class=\"chip\">FR-###<\u002Fspan>/<span class=\"chip\">NFR-###<\u002Fspan>, and open questions routed back to the legislature.<\u002Fp>\n        <p class=\"body mkrow\" style=\"font-size:12px;\"><span class=\"mk\"><span class=\"badge law\">EXT<\u002Fspan><\u002Fspan><span class=\"chip\">/speckit.sdd-judiciary.tests-specify<\u002Fspan> authors <span class=\"chip\">tests.md<\u002Fspan> from <span class=\"chip\">spec.md<\u002Fspan> only, pinned to a different model family than <span class=\"chip\">/speckit.implement<\u002Fspan>. Forbidden from reading <span class=\"chip\">plan.md<\u002Fspan>, contracts, or source, since the implementation biases the oracle. Refuses if any acceptance criterion is unmeasurable and routes it back to <span class=\"chip\">clarify<\u002Fspan>.<\u002Fp>\n        <p class=\"body mkrow\" style=\"font-size:12px;\"><span class=\"mk\"><span class=\"badge law\">EXT<\u002Fspan><\u002Fspan><span class=\"chip\">/speckit.sdd-judiciary.tests-gaps<\u002Fspan> writes <span class=\"chip\">test-gaps.md<\u002Fspan>: a read-only, CI-friendly judiciary check that lists any requirement with no matching test and exits non-zero on a critical gap — a Gate 7 dry-run.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"note\" style=\"margin-top:10px;\"><span class=\"nt\">Why a preset <em>and<\u002Fem> an extension.<\u002Fspan> Spec Kit’s manifest validator treats any command name with three or more dot segments (<span class=\"lab\">speckit.&lt;ext-id&gt;.&lt;cmd&gt;<\u002Fspan>) as an extension command and silently drops it unless the matching extension is installed. Presets may only customise existing two-segment artefacts; new commands must ship as an extension.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:13px;\">\n      <div class=\"seclabel\">I.3 &nbsp;THE COMMAND SEQUENCE<\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:4px;font-size:9.5px;line-height:1.5;\">1.  /speckit.specify \"&lt;intent&gt;\"           writes spec.md (Risk Tier, EARS, Non-goals, AC)\n2.  /speckit.clarify                      updates spec.md until no AC is unmeasurable\n3.  /speckit.plan \"&lt;stack&gt;\"               writes plan.md and design artifacts (executive)\n4.  /speckit.checklist testability        cross-validates spec against plan\n5.  /speckit.sdd-judiciary.tests-specify  judiciary, Model B, reads spec.md only -&gt; tests.md\n6.  /speckit.tasks                        standard Spec Kit task decomposition\n7.  /speckit.analyze                      confirms spec &lt;-&gt; plan &lt;-&gt; tasks &lt;-&gt; tests align\n8.  /speckit.sdd-judiciary.tests-gaps     judiciary dry-run, fails on any uncovered requirement\n9. /speckit.implement                    Model A executes the tasks -&gt; src/**, lib/**, tests/**<br><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix I<\u002Fspan><span class=\"pg\">53<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 54 · APPENDIX I (2) ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX I · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">Installation &amp; Mapping<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    \n\n    <div class=\"sec\" style=\"margin-top:13px;\">\n      <div class=\"seclabel\">I.4&nbsp; INSTALLATION<\u002Fdiv>\n      <pre class=\"code\" style=\"margin-top:4px;font-size:8.5px;line-height:1.4;\"><span style=\"color:#9a9186;\"># prerequisite: the project is initialised for your integration<\u002Fspan>\nspecify init --integration copilot\n\n<span style=\"color:#9a9186;\"># 1) install the preset (templates), above the default priority of 10<\u002Fspan>\nspecify preset add --dev ./sdd-judiciary-preset --priority 5\n<span style=\"color:#9a9186;\"># 2) install the extension (the two slash commands)<\u002Fspan>\nspecify extension add --dev ./sdd-judiciary-extension\n\n<span style=\"color:#9a9186;\"># verify<\u002Fspan>\nspecify preset resolve spec-template      <span style=\"color:#9a9186;\"># -&gt; preset's wrapped template<\u002Fspan>\nspecify extension info sdd-judiciary\ncat .specify/extensions/.registry         <span style=\"color:#9a9186;\"># -&gt; registered_commands not empty<\u002Fspan><\u002Fpre>\n      <p class=\"body\" style=\"font-size:11.5px;line-height:1.45;margin-top:7px;\"><span class=\"chip\">--priority 5<\u002Fspan> puts the preset above the default of 10, so its template wraps win the resolution stack. Both pieces are independent, but the workflow needs both; if <span class=\"lab\">registered_commands<\u002Fspan> is empty the integration was never initialised. <span class=\"chip\">specify extension remove sdd-judiciary<\u002Fspan> then <span class=\"chip\">preset remove<\u002Fspan> reverts to vanilla — the reversible-deviation property the playbook asks for. A prompt change is a code change (<a href=\"#23-rulebook\">§2.3<\u002Fa>): bump the version and rerun your evaluation set.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:11px;\">\n      <div class=\"seclabel\">I.5&nbsp; HOW IT MAPS TO THE PLAYBOOK<\u002Fdiv>\n      <table class=\"tbl\" style=\"font-size:10.5px;\">\n        <thead><tr><th style=\"width:46%;\">Playbook rule<\u002Fth><th>Where the preset enforces it<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>The spec is the law, human-approved before code<\u002Ftd><td><span class=\"lab\">spec-template.md<\u002Fspan> sign-off block plus the <span class=\"chip\">clarify<\u002Fspan> gate<\u002Ftd><\u002Ftr>\n          <tr><td>The oracle is not written by the coder<\u002Ftd><td><span class=\"chip\">/speckit.sdd-judiciary.tests-specify<\u002Fspan> plus the <span class=\"lab\">AGENTS.md<\u002Fspan> sub-agent split<\u002Ftd><\u002Ftr>\n          <tr><td>Tests derived from the spec, <strong>not<\u002Fstrong> the implementation<\u002Ftd><td>the command’s forbidden-reads (no <span class=\"lab\">plan.md<\u002Fspan>, no source)<\u002Ftd><\u002Ftr>\n          <tr><td>A different model family verifies<\u002Ftd><td>the “two names, two families” rule<\u002Ftd><\u002Ftr>\n          <tr><td>Gate 7, every requirement has a linked test<\u002Ftd><td><span class=\"chip\">/speckit.sdd-judiciary.tests-gaps<\u002Fspan> dry-run plus <span class=\"lab\">tools/spec_trace.py<\u002Fspan> at merge<\u002Ftd><\u002Ftr>\n          <tr><td>Risk tier sets the gate thresholds<\u002Ftd><td>the Risk Tier field plus the constitution<\u002Ftd><\u002Ftr>\n          <tr><td>Sessions sized to context, model matched to difficulty<\u002Ftd><td>a fresh session per command, handoffs in the front-matter<\u002Ftd><\u002Ftr>\n          <tr><td>Reversible deviation from the process<\u002Ftd><td><span class=\"chip\">specify extension remove sdd-judiciary<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix I<\u002Fspan><span class=\"pg\">54<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 55 · APPENDIX J (1) — OVERVIEW + GATE 5 ============ -->\n<div class=\"page\" id=\"appendix-j\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX J<\u002Fdiv>\n    <h1 class=\"h1 sm\">The CI Gate Workflows<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:13px;\">The body of the playbook keeps tool setup out of the way; this appendix puts it back for the reference implementation. Each gate in <a href=\"#3-gates\">Part III<\u002Fa> maps to exactly one workflow under <span class=\"lab\">.github/workflows/<\u002Fspan>, and every one is wired as a required check so the default branch cannot merge while it is red. The files are reproduced verbatim on these pages. Gate 8 (build provenance) ships as a separate release workflow and is omitted here.<\u002Fp>\n\n    <div style=\"margin-top:14px;\">\n      <table class=\"tbl\" style=\"font-size:11.5px;\">\n        <thead><tr><th style=\"width:18%;\">Gate<\u002Fth><th style=\"width:30%;\">What it checks<\u002Fth><th style=\"width:25%;\">Workflow file<\u002Fth><th>Runs on<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>0 / 1<\u002Fstrong><\u002Ftd><td>Lint, types, unit &amp; integration baseline<\u002Ftd><td><span class=\"lab\">ci.yml<\u002Fspan><\u002Ftd><td>push · PR<\u002Ftd><\u002Ftr>\n          <tr><td><strong>2 / 3a / 7<\u002Fstrong><\u002Ftd><td>Spec ↔ tests.md ↔ tests/ traceability<\u002Ftd><td><span class=\"lab\">spec-trace.yml<\u002Fspan><\u002Ftd><td>push · PR (spec/test paths)<\u002Ftd><\u002Ftr>\n          <tr><td><strong>3<\u002Fstrong><\u002Ftd><td>Mutation testing (Stryker)<\u002Ftd><td><span class=\"lab\">mutation.yml<\u002Fspan><\u002Ftd><td>nightly · high-risk PR · manual<\u002Ftd><\u002Ftr>\n          <tr><td><strong>4<\u002Fstrong><\u002Ftd><td>Static analysis (SAST)<\u002Ftd><td><span class=\"lab\">codeql.yml<\u002Fspan><\u002Ftd><td>push · PR · weekly<\u002Ftd><\u002Ftr>\n          <tr><td><strong>5<\u002Fstrong><\u002Ftd><td>Dependency scan<\u002Ftd><td><span class=\"lab\">dependency-review.yml<\u002Fspan><\u002Ftd><td>PR<\u002Ftd><\u002Ftr>\n          <tr><td><strong>6<\u002Fstrong><\u002Ftd><td>Secret scan<\u002Ftd><td><span class=\"lab\">gitleaks.yml<\u002Fspan><\u002Ftd><td>push · PR<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"seclabel\" style=\"margin-top:16px;\">GATE 5 · <span class=\"lab\" style=\"text-transform:none;letter-spacing:0;\">.github/workflows/dependency-review.yml<\u002Fspan><\u002Fdiv>\n    <pre class=\"code\" style=\"margin-top:4px;font-size:8px;line-height:1.42;\"><span style=\"color:#9a9186;\"># Gate 5 — Dependency scan (per-PR enforcement).\n# Dependabot (.github/dependabot.yml) raises fixes on a schedule; this action\n# blocks any pull request that introduces a known-vulnerable dependency.<\u002Fspan>\n\nname: Gate 5 — Dependency Review\n\non:\n  pull_request:\n\npermissions:\n  contents: read\n  pull-requests: write\n\njobs:\n  dependency-review:\n    name: Scan dependency changes\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - name: Dependency Review\n        uses: actions/dependency-review-action@v4\n        with:\n          fail-on-severity: high\n          comment-summary-in-pr: on-failure<\u002Fpre>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix J<\u002Fspan><span class=\"pg\">55<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 56 · APPENDIX J (2) — GATE 0/1 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX J · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">Gate 0 / 1 — Lint &amp; Types<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"cap\" style=\"margin-top:9px;\">.github/workflows/ci.yml &nbsp;·&nbsp; catches malformed code on every push and pull request; unit tests run as the baseline for mutation.<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-top:11px;font-size:8.5px;line-height:1.45;\"><span style=\"color:#9a9186;\"># Gate 0/1 — Lint + types (and unit tests as a baseline for mutation).\n# Catches malformed code on every push and pull request.<\u002Fspan>\n\nname: CI — Lint &amp; Types\n\non:\n  push:\n    branches: [\"**\"]\n  pull_request:\n\npermissions:\n  contents: read\n\nconcurrency:\n  group: ci-${<span><\u002Fspan>{ github.ref }<span><\u002Fspan>}\n  cancel-in-progress: true\n\njobs:\n  lint-and-types:\n    name: ESLint + tsc\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: actions/setup-node@v4\n        with:\n          node-version: \"20\"\n          cache: \"npm\"\n\n      - name: Install dependencies\n        run: npm ci\n\n      - name: Generate Prisma client\n        run: npx prisma generate\n\n      - name: Lint (Gate 0/1)\n        run: npm run lint\n\n      - name: Type-check (Gate 0/1)\n        run: npx tsc --noEmit -p tsconfig.json\n\n  unit-tests:\n    name: Vitest\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - uses: actions/setup-node@v4\n        with:\n          node-version: \"20\"\n          cache: \"npm\"\n\n      - name: Install dependencies\n        run: npm ci\n\n      - name: Generate Prisma client\n        run: npx prisma generate\n\n      - name: Run unit + integration tests\n        run: npm test<\u002Fpre>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix J<\u002Fspan><span class=\"pg\">56<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 57 · APPENDIX J (3) — GATES 2/3a/7 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX J · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">Gates 2 / 3a / 7 — Spec Trace<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"cap\" style=\"margin-top:9px;\">.github/workflows/spec-trace.yml &nbsp;·&nbsp; deterministic, merge-blocking. Powered by tools/spec_trace.py (zero non-stdlib deps).<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-top:11px;font-size:8.5px;line-height:1.42;\"><span style=\"color:#9a9186;\"># Gates 2 / 3a / 7 — deterministic spec ↔ tests.md ↔ tests/ trace.\n#\n#   Gate 2  ID coverage        — every oracle ID in tests.md has a test\n#   Gate 3a Assertion presence — every referenced test file asserts something\n#   Gate 7  Conformance        — every requirement in spec.md has an oracle entry\n#\n# Powered by tools/spec_trace.py (zero non-stdlib deps). Merge-blocking.<\u002Fspan>\n\nname: SDD Gates 2/3a/7 — Spec Trace\n\non:\n  push:\n    branches: [\"**\"]\n  pull_request:\n    paths:\n      - \"specs/**\"\n      - \"tests/**\"\n      - \"tools/spec_trace.py\"\n      - \".github/workflows/spec-trace.yml\"\n\npermissions:\n  contents: read\n\njobs:\n  trace:\n    name: Verify spec ↔ test traceability\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: actions/setup-python@v5\n        with:\n          python-version: \"3.12\"\n\n      - name: Run spec trace for every feature\n        env:\n          # Gate 2 ID-coverage threshold (percent). Set the repo variable\n          # COVERAGE_THRESHOLD to relax the gate; defaults to 100 when unset.\n          COVERAGE_THRESHOLD: ${<span><\u002Fspan>{ vars.COVERAGE_THRESHOLD }<span><\u002Fspan>}\n        run: |\n          set -e\n          shopt -s nullglob\n          min_coverage=\"${COVERAGE_THRESHOLD:-100}\"\n          echo \"Gate 2 coverage threshold: ${min_coverage}%\"\n          features=(specs/*/)\n          if [ ${#features[@]} -eq 0 ]; then\n            echo \"No features under specs/ — skipping.\"\n            exit 0\n          fi\n          fail=0\n          for f in \"${features[@]}\"; do\n            feature_path=\"${f%/}\"\n            if [ ! -f \"$feature_path/tests.md\" ]; then\n              echo \"Skip $feature_path (no tests.md)\"; continue\n            fi\n            echo \"::group::SDD trace — $feature_path\"\n            python tools/spec_trace.py --feature \"$feature_path\" --min-coverage \"$min_coverage\" || fail=1\n            echo \"::endgroup::\"\n          done\n          exit $fail<\u002Fpre>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix J<\u002Fspan><span class=\"pg\">57<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 58 · APPENDIX J (4) — GATE 3 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX J · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">Gate 3 — Mutation Testing<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"cap\" style=\"margin-top:9px;\">.github/workflows/mutation.yml &nbsp;·&nbsp; expensive, so not on every push: nightly on main, diff-only on high-risk PRs, or manual.<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-top:11px;font-size:8.5px;line-height:1.42;\"><span style=\"color:#9a9186;\"># Gate 3 — Mutation testing via Stryker.\n# Catches tests that execute code but assert nothing (surviving mutants).\n# Not on every push:\n#   - nightly:       full mutation run on main\n#   - high-risk PRs: diff-only run, triggered by the \"high-risk\" label\n#   - manual:        workflow_dispatch\n# Stryker is installed on the fly (--no-save) so the lockfile stays clean.<\u002Fspan>\n\nname: Gate 3 — Mutation Testing (Stryker)\n\non:\n  schedule:\n    - cron: \"0 2 * * *\" # nightly, 02:00 UTC\n  workflow_dispatch:\n  pull_request:\n    types: [labeled, synchronize, reopened]\n\npermissions:\n  contents: read\n\njobs:\n  mutation:\n    name: Stryker\n    # Run on nightly/manual, or only when a PR carries the \"high-risk\" label.\n    if: &gt;-\n      github.event_name != 'pull_request' ||\n      contains(github.event.pull_request.labels.*.name, 'high-risk')\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          fetch-depth: 0 # needed for Stryker's --since diff detection on PRs\n\n      - uses: actions/setup-node@v4\n        with:\n          node-version: \"20\"\n          cache: \"npm\"\n\n      - name: Install dependencies\n        run: npm ci\n      - name: Generate Prisma client\n        run: npx prisma generate\n\n      - name: Install Stryker (not persisted to lockfile)\n        run: npm install --no-save @stryker-mutator/core @stryker-mutator/vitest-runner\n\n      - name: Run mutation testing (diff only on PRs)\n        run: |\n          if [ \"${<span><\u002Fspan>{ github.event_name }<span><\u002Fspan>}\" = \"pull_request\" ]; then\n            npx stryker run --since origin/${<span><\u002Fspan>{ github.base_ref }<span><\u002Fspan>}\n          else\n            npx stryker run\n          fi\n\n      - name: Upload mutation report\n        if: always()\n        uses: actions/upload-artifact@v4\n        with:\n          name: stryker-report\n          path: reports/mutation/\n          if-no-files-found: ignore<\u002Fpre>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix J<\u002Fspan><span class=\"pg\">58<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 59 · APPENDIX J (5) — GATE 4 + GATE 6 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX J · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">Gate 4 — SAST &nbsp;·&nbsp; Gate 6 — Secrets<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div class=\"seclabel\" style=\"margin-top:13px;\">GATE 4 · <span class=\"lab\" style=\"text-transform:none;letter-spacing:0;\">.github/workflows/codeql.yml<\u002Fspan><\u002Fdiv>\n    <pre class=\"code\" style=\"margin-top:4px;font-size:8px;line-height:1.4;\"><span style=\"color:#9a9186;\"># Gate 4 — SAST via CodeQL. Catches insecure code patterns on every push.<\u002Fspan>\nname: Gate 4 — CodeQL (SAST)\non:\n  push:\n    branches: [\"**\"]\n  pull_request:\n  schedule:\n    - cron: \"0 3 * * 1\" # weekly deep scan in case the ruleset updates\npermissions:\n  contents: read\n  security-events: write\njobs:\n  analyze:\n    name: Analyze (javascript-typescript)\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Initialize CodeQL\n        uses: github/codeql-action/init@v3\n        with:\n          languages: javascript-typescript\n          queries: security-extended\n      - name: Autobuild\n        uses: github/codeql-action/autobuild@v3\n      - name: Perform CodeQL analysis\n        uses: github/codeql-action/analyze@v3\n        with:\n          category: \"/language:javascript-typescript\"<\u002Fpre>\n\n    <div class=\"seclabel\" style=\"margin-top:13px;\">GATE 6 · <span class=\"lab\" style=\"text-transform:none;letter-spacing:0;\">.github/workflows/gitleaks.yml<\u002Fspan><\u002Fdiv>\n    <pre class=\"code\" style=\"margin-top:4px;font-size:8px;line-height:1.4;\"><span style=\"color:#9a9186;\"># Gate 6 — Secret scanning via gitleaks. Catches leaked credentials on\n# every push and pull request.<\u002Fspan>\nname: Gate 6 — Secret Scan (gitleaks)\non:\n  push:\n    branches: [\"**\"]\n  pull_request:\npermissions:\n  contents: read\njobs:\n  gitleaks:\n    name: gitleaks\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          fetch-depth: 0 # full history so pushes scan every new commit\n      - name: Run gitleaks\n        uses: gitleaks/gitleaks-action@v2\n        env:\n          GITHUB_TOKEN: ${<span><\u002Fspan>{ secrets.GITHUB_TOKEN }<span><\u002Fspan>}\n          # GITLEAKS_LICENSE only required for GitHub organizations.<\u002Fpre>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix J<\u002Fspan><span class=\"pg\">59<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 60 · APPENDIX K — SPECIFY A FEATURE ============ -->\n<div class=\"page\" id=\"appendix-k\" style=\"--accent:#4D5159;--rule:#7B7F86;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">APPENDICES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">APPENDIX K<\u002Fdiv>\n    <h1 class=\"h1 sm\">Specifying a New Feature, Step by Step<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:13px;\">Once feature 001 is merged, every later feature runs the exact same flow. Nothing about the second feature is special; the discipline is in repeating the sequence, not in remembering a different one. Below is feature 002 from a clean <span class=\"lab\">main<\u002Fspan>, with the judiciary commands from <a href=\"#appendix-i\">Appendix&nbsp;I<\u002Fa> in place.<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-top:12px;font-size:9.5px;line-height:1.55;\"><span style=\"color:#9a9186;\"># make sure feature 001 is merged and you're back on main<\u002Fspan>\ngit checkout main\ngit pull\n\n<span style=\"color:#9a9186;\"># start feature 002 — exactly the same flow as feature 001<\u002Fspan>\n/speckit.specify   \"Users can add threaded comments to tickets, with @mentions\"\n/speckit.clarify\n/speckit.plan\n/speckit.checklist testability\n/speckit.sdd-judiciary.tests-specify\n/speckit.tasks\n/speckit.analyze\n/speckit.sdd-judiciary.tests-gaps\n/speckit.implement\n/speckit.converge\n/speckit.sdd-judiciary.tests-trace\n<span style=\"color:#9a9186;\"># → PR → CI gates → merge<\u002Fspan><\u002Fpre>\n\n    <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:10px;\">\n      <div class=\"seclabel\">TWO PRACTICAL TIPS<\u002Fdiv>\n      <p class=\"body mkrow\" style=\"font-size:12.5px;\"><span class=\"mk\"><span class=\"badge practice\">TIP<\u002Fspan><\u002Fspan><strong>Always start from a clean <span class=\"lab\">main<\u002Fspan>.<\u002Fstrong> Don't run <span class=\"chip\">/speckit.specify<\u002Fspan> while still on the previous feature's branch — Spec Kit will branch off that branch and you'll end up with a weird tree. Merge or close the previous PR first, <span class=\"lab\">git checkout main<\u002Fspan>, then start.<\u002Fp>\n      <p class=\"body mkrow\" style=\"font-size:12.5px;\"><span class=\"mk\"><span class=\"badge practice\">TIP<\u002Fspan><\u002Fspan><strong>Reference the previous feature in the intent if relevant.<\u002Fstrong> If feature 002 builds on or modifies feature 001's surface, mention it in the one-paragraph intent you pass to <span class=\"chip\">/speckit.specify<\u002Fspan>. The spec agent can read <span class=\"lab\">specs/001-*/spec.md<\u002Fspan> for context if you point at it explicitly — but only for context, not as a starting point. Each spec is independent.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"note viol\" style=\"margin-top:14px;\">\n      <span class=\"nt\">What does NOT happen automatically.<\u002Fspan> Two small footguns to know about. <strong>First,<\u002Fstrong> the constitution does not auto-update from feature learnings: if feature 002 reveals a new project-wide rule (say \"every API response must include a <span class=\"lab\">requestId<\u002Fspan>\"), you add it manually via <span class=\"chip\">/speckit.constitution<\u002Fspan> — it does not propagate from a feature spec by itself. <strong>Second,<\u002Fstrong> requirement IDs are per-feature, not globally unique: <span class=\"lab\">specs/001-tickets/spec.md<\u002Fspan> and <span class=\"lab\">specs/002-comments/spec.md<\u002Fspan> will probably both have an <span class=\"chip\">FR-001<\u002Fspan>. The <span class=\"lab\">spec_trace.py<\u002Fspan> gate handles this correctly because it scopes per feature directory, but if you ever run cross-feature analytics, remember the IDs are not globally unique.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Appendix K<\u002Fspan><span class=\"pg\">60<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 61 · COLOPHON / END ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">END OF SEASON 1<\u002Fspan><\u002Fdiv>\n    <div style=\"margin-top:auto;margin-bottom:auto;max-width:560px;\">\n      <div style=\"display:flex;gap:6px;margin-bottom:26px;\">\n        <span style=\"width:64px;height:3px;background:#9C7A2E;\"><\u002Fspan>\n        <span style=\"width:64px;height:3px;background:#4D5159;\"><\u002Fspan>\n        <span style=\"width:64px;height:3px;background:#7B1818;\"><\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-family:'Libre Baskerville',serif;font-size:23px;line-height:1.5;color:#2A2620;margin:0;text-wrap:pretty;\">A playbook is a living document. When the work changes, you bump the version and run it again.<\u002Fp>\n      <p style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:18px;line-height:1.5;color:#3A332C;margin:22px 0 0;\">The practices will evolve. The separation of powers will not.<\u002Fp>\n      <div style=\"margin-top:34px;border-top:1px solid #ECE7DD;padding-top:18px;display:grid;grid-template-columns:auto 1fr;gap:5px 22px;font-size:12px;color:#6E655A;\">\n        <span class=\"lab\" style=\"color:#9a9186;letter-spacing:.06em;\">AUTHOR<\u002Fspan><span style=\"color:#211C16;font-weight:600;\">Carlo Verzeri<\u002Fspan>\n        <span class=\"lab\" style=\"color:#9a9186;letter-spacing:.06em;\">EDITION<\u002Fspan><span>The AI-First SDD Playbook · Season 1, v1.0<\u002Fspan>\n        <span class=\"lab\" style=\"color:#9a9186;letter-spacing:.06em;\">TYPE<\u002Fspan><span>Libre Baskerville · Public Sans · IBM Plex Mono<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>End of Season 1<\u002Fspan><span class=\"dia\">◆<\u002Fspan><span class=\"pg\">61<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!--PAGES-END-->\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:794,&quot;height&quot;:1123},&quot;link&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4D5159&quot;,&quot;options&quot;:[&quot;#2D5FC7&quot;,&quot;#7B1818&quot;,&quot;#4D5159&quot;,&quot;#9C7A2E&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Book&quot;},&quot;noteStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Gloss&quot;,&quot;options&quot;:[&quot;Gloss&quot;,&quot;Band&quot;,&quot;Ledger&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Highlights&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      link: this.props.link ?? '#2D5FC7',\n      noteStyle: (this.props.noteStyle ?? 'Gloss').toLowerCase(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
