document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#EFEBE2;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-family:'Public Sans',sans-serif;color:#3A332C;}\n  .page{width:794px;height:1123px;background:#FCFBF8;box-shadow:0 18px 50px rgba(0,0,0,.16);position:relative;overflow:hidden;margin:34px 0;}\n  .pad{position:absolute;inset:0;padding:58px 84px 86px;display:flex;flex-direction:column;}\n  .hdr{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;letter-spacing:.01em;color:#9a9186;flex:none;}\n  .hdr .br{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--accent);}\n  .ftr{position:absolute;left:84px;right:84px;bottom:32px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#9a9186;}\n  .ftr .dia{color:var(--rule);font-size:9px;}\n  .ftr .pg{font-family:'Libre Baskerville',serif;font-size:13px;color:var(--accent);}\n  .kick{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--accent);margin:0;}\n  .h1{font-family:'Libre Baskerville',serif;font-weight:700;font-size:33px;line-height:1.09;color:#211C16;margin:11px 0 0;letter-spacing:-.01em;}\n  .h1.sm{font-size:27px;}\n  .rule{width:48px;height:2px;background:var(--rule);margin:13px 0 0;flex:none;}\n  .lead{font-size:15.5px;line-height:1.55;color:#2f2a23;text-wrap:pretty;margin:15px 0 0;}\n  .body{font-size:13.5px;line-height:1.58;color:#3A332C;text-wrap:pretty;margin:0;}\n  .body+.body{margin-top:9px;}\n  .seclabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.15em;color:var(--accent);margin:0 0 6px;}\n  .h2{font-family:'Libre Baskerville',serif;font-weight:700;font-size:18px;color:#211C16;margin:0;letter-spacing:-.005em;}\n  .h3{font-size:12.5px;font-weight:700;letter-spacing:.01em;color:#211C16;margin:0 0 4px;}\n  a{color:var(--link,#2D5FC7);text-decoration:underline;text-underline-offset:2px;text-decoration-thickness:1px;}\n  em{font-style:italic;color:#211C16;}\n  strong{font-weight:600;color:#211C16;}\n  .lab{font-family:'IBM Plex Mono',monospace;}\n  .chip{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#4A4031;background:#ECE6D7;border:1px solid #E1D9C5;border-radius:4px;padding:1px 5px;white-space:nowrap;}\n  /* ---- LAW / PRACTICE / VIOLATION marker — one solid stamp used everywhere ---- */\n  .badge{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:2px;padding:3px 6px 2.5px;color:#fff;white-space:nowrap;display:inline-block;line-height:1;vertical-align:middle;}\n  .law{background:#9C7A2E;}\n  .practice{background:#4D5159;}\n  .violation{background:#9B2D2D;}\n  /* left-margin rail: marker sits out in the page margin, body text stays put */\n  .mkrow{position:relative;}\n  .mk{position:absolute;left:-84px;top:.12em;width:68px;display:flex;justify-content:flex-end;pointer-events:none;}\n  .mk .badge{box-shadow:0 1px 2px rgba(0,0,0,.10);}\n  .code{font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.5;color:#3a3228;background:#F2ECDD;border:1px solid #E2D9C4;border-radius:6px;padding:13px 15px;white-space:pre;overflow:hidden;tab-size:2;}\n  .gmap a{transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;}\n  .gmap a:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(33,28,22,.10);border-color:var(--rule)!important;}\n  .tbl{width:100%;border-collapse:collapse;font-size:12px;line-height:1.42;margin:0;}\n  .tbl th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:500;border-bottom:1.5px solid #D9D1C2;padding:0 12px 6px 0;vertical-align:bottom;}\n  .tbl td{border-bottom:1px solid #EDE8DE;padding:7px 12px 7px 0;color:#3A332C;vertical-align:top;text-wrap:pretty;}\n  .tbl td:last-child,.tbl th:last-child{padding-right:0;}\n  .tbl tr:last-child td{border-bottom:none;}\n  .sec{display:flex;flex-direction:column;}\n  .anti{margin-top:auto;border-top:1px solid #ECE7DD;padding-top:13px;flex:none;}\n  .antilabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.15em;color:#9B2D2D;margin:0 0 9px;}\n  .antirow{display:flex;gap:11px;font-size:13px;line-height:1.5;color:#3A332C;}\n  .antirow+.antirow{margin-top:7px;}\n  .antirow .x{color:#9B2D2D;flex:none;}\n  /* ---- Side-note highlight: 3 book-wide treatments driven by .book[data-note] — no box ---- */\n  .note{font-size:12.5px;line-height:1.58;color:#3A332C;}\n  .note .nt{font-weight:700;color:#211C16;}\n  .note.viol .nt{color:#9B2D2D;}\n  /* 1 · GLOSS — mono label out in the left margin rail (aligned with the LAW/PRACTICE badges); body keeps full measure */\n  .book[data-note=\"gloss\"] .note{position:relative;}\n  .book[data-note=\"gloss\"] .note:not(.mkrow)::before{content:\"NOTE\";position:absolute;left:-84px;top:.2em;width:68px;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.14em;color:var(--accent);}\n  .book[data-note=\"gloss\"] .note.viol:not(.mkrow)::before{color:#9B2D2D;}\n  .book[data-note=\"gloss\"] .note.mkrow .mk{top:.2em;}\n  /* 2 · BAND — hairline above + mono kicker (the badge replaces the kicker when present) */\n  .book[data-note=\"band\"] .note{border-top:1px solid #E0D9CA;padding-top:11px;}\n  .book[data-note=\"band\"] .note:not(.mkrow)::before{content:\"NOTE\";display:block;font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:500;letter-spacing:.16em;color:var(--accent);margin-bottom:6px;}\n  .book[data-note=\"band\"] .note.viol{border-top-color:#9B2D2D;}\n  .book[data-note=\"band\"] .note.viol:not(.mkrow)::before{color:#9B2D2D;}\n  .book[data-note=\"band\"] .note.mkrow .mk{top:11px;}\n  /* 3 · LEDGER — keyed entry: mono key column + body, hairline top & bottom */\n  .book[data-note=\"ledger\"] .note{border-top:1px solid #E0D9CA;border-bottom:1px solid #E0D9CA;padding:12px 0;}\n  .book[data-note=\"ledger\"] .note:not(.mkrow){position:relative;padding-left:102px;}\n  .book[data-note=\"ledger\"] .note:not(.mkrow)::before{content:\"NOTE\";position:absolute;left:0;top:14px;width:84px;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;color:var(--accent);}\n  .book[data-note=\"ledger\"] .note.viol{border-color:#9B2D2D;}\n  .book[data-note=\"ledger\"] .note.viol:not(.mkrow)::before{color:#9B2D2D;}\n  .book[data-note=\"ledger\"] .note.mkrow .mk{top:12px;}\n  .statement{padding-left:21px;border-left:2px solid var(--accent);}\n  .statement p{font-family:'Libre Baskerville',serif;font-style:italic;font-size:16px;line-height:1.62;color:#2A2620;margin:0;text-wrap:pretty;}\n  .statement .nt{font-style:normal;font-weight:700;color:#211C16;}\n  .cap{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;color:#9a9186;margin:7px 0 0;}\n  .ph{background:repeating-linear-gradient(135deg,#F1ECE0,#F1ECE0 7px,#ECE6D7 7px,#ECE6D7 14px);border:1px solid #E2D9C4;border-radius:6px;display:flex;align-items:center;justify-content:center;}\n  .gnum{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--accent);font-weight:600;}\n  .gh{font-family:'Libre Baskerville',serif;font-weight:700;font-size:17px;color:#211C16;margin:0;letter-spacing:-.005em;}\n  .ghead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}\n  .gcard{margin-top:7px;display:grid;grid-template-columns:66px 1fr;gap:5px 12px;align-items:start;}\n  .gcard>p{font-size:12.5px;line-height:1.48;margin:0;color:#3A332C;text-wrap:pretty;}\n  .gl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.11em;text-transform:uppercase;color:#5C5346;padding-top:3px;}\n  .book[data-hdr=\"off\"] .hdr{visibility:hidden;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"book\" data-note=\"{{ noteStyle }}\" style=\"--link:{{ link }};\">\n\n<!-- ============ 1 · COVER (leather, oxblood + gold) ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\" style=\"padding:0;\">\n    <!-- tri-power cover: solid blocks — legislative gold (top) · executive slate (title band) · judiciary oxblood (bottom) -->\n    <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(108deg, rgba(0,0,0,.04) 0 2px, rgba(255,255,255,.011) 2px 5px), repeating-radial-gradient(circle at 26% 16%, rgba(0,0,0,.035) 0 1px, rgba(255,255,255,.011) 1px 2px), linear-gradient(180deg,#6E5428 0,#6E5428 24%,#44474D 24%,#44474D 64%,#5C1A1A 64%,#5C1A1A 100%);\"><\u002Fdiv>\n    <!-- sheen -->\n    <div style=\"position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,224,205,.07),rgba(0,0,0,0) 26%), radial-gradient(58% 38% at 50% 6%, rgba(255,232,212,.06), rgba(0,0,0,0) 70%);\"><\u002Fdiv>\n    <!-- gold frames -->\n    <div style=\"position:absolute;inset:30px;border:2px solid rgba(203,164,78,.85);box-shadow:inset 0 0 22px rgba(0,0,0,.4), 0 1px 0 rgba(255,224,180,.06);\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:39px;border:1px solid rgba(203,164,78,.42);\"><\u002Fdiv>\n    <!-- gold separators between the three powers -->\n    <div style=\"position:absolute;left:30px;right:30px;top:24%;height:2px;background:linear-gradient(90deg,rgba(203,164,78,.55),#E3C57E 50%,rgba(203,164,78,.55));box-shadow:0 1px 1px rgba(0,0,0,.35);\"><\u002Fdiv>\n    <div style=\"position:absolute;left:30px;right:30px;top:64%;height:2px;background:linear-gradient(90deg,rgba(203,164,78,.55),#E3C57E 50%,rgba(203,164,78,.55));box-shadow:0 1px 1px rgba(0,0,0,.35);\"><\u002Fdiv>\n\n    <!-- top running labels -->\n    <div style=\"position:absolute;left:84px;right:84px;top:72px;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.24em;color:#EAD8AA;\">\n      <span>FIELD&nbsp;MANUAL<\u002Fspan><span>SEASON&nbsp;1&nbsp;·&nbsp;v1.0<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- title block -->\n    <div style=\"position:absolute;left:64px;right:64px;top:300px;text-align:center;\">\n      <div style=\"font-size:17px;color:#CBA64E;letter-spacing:.3em;margin-bottom:26px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5));\">◆<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.32em;color:#C79F4A;\">SPEC‑DRIVEN&nbsp;DEVELOPMENT<\u002Fdiv>\n      <h1 style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:64px;line-height:1.04;letter-spacing:-.015em;margin:22px 0 0;background:linear-gradient(180deg,#F2DA9C 0%,#DCB868 36%,#A97C2C 58%,#EACA80 100%);-webkit-background-clip:text;background-clip:text;color:#D9B463;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 2px rgba(0,0,0,.5));\">The&nbsp;AI‑First<br>SDD&nbsp;Playbook<\u002Fh1>\n      <div style=\"margin:30px 0 2px;display:flex;flex-direction:column;align-items:center;gap:13px;\">\n        <span style=\"width:128px;height:1px;background:linear-gradient(90deg,rgba(203,164,78,0),rgba(203,164,78,.7),rgba(203,164,78,0));\"><\u002Fspan>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.24em;display:flex;gap:11px;align-items:center;\"><span style=\"color:#D4A94E;\">LEGISLATIVE<\u002Fspan><span style=\"color:#8A6A2C;\">·<\u002Fspan><span style=\"color:#9DA3AB;\">EXECUTIVE<\u002Fspan><span style=\"color:#8A6A2C;\">·<\u002Fspan><span style=\"color:#C76F66;\">JUDICIARY<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:19px;line-height:1.45;color:#E7D3AC;margin:24px auto 0;max-width:430px;\">Spec-Driven Development for the Agentic SDLC. A Field Manual.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- byline / metadata -->\n    <div style=\"position:absolute;left:84px;right:84px;bottom:80px;\">\n      <div style=\"height:1px;background:linear-gradient(90deg,rgba(203,164,78,0),rgba(203,164,78,.55),rgba(203,164,78,0));margin-bottom:20px;\"><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:auto 1fr;gap:7px 22px;font-size:12.5px;line-height:1.5;color:#E7D3AC;max-width:560px;margin:0 auto;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;color:#B89348;letter-spacing:.14em;font-size:10px;padding-top:1px;\">AUTHOR<\u002Fspan><span style=\"font-weight:600;color:#F3E6C8;\">Carlo Verzeri<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;color:#B89348;letter-spacing:.14em;font-size:10px;padding-top:1px;\">EDITION<\u002Fspan><span>Season 1, v1.0&nbsp;·&nbsp;Last revised June 2026<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;color:#B89348;letter-spacing:.14em;font-size:10px;padding-top:2px;\">SCOPE<\u002Fspan><span style=\"color:#D8C49C;\">Stack-agnostic. Where an example helps, it uses TypeScript and Python. Named tools are practices you can swap. The gates and the practices are the playbook.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 2 · FRONTISPIECE / AUTHOR'S NOTE ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">AUTHOR’S NOTE<\u002Fspan><\u002Fdiv>\n    <div style=\"margin-top:auto;margin-bottom:auto;max-width:600px;\">\n      <div class=\"kick\">AUTHOR’S NOTE<\u002Fdiv>\n      <p style=\"font-family:'Libre Baskerville',serif;font-size:21px;line-height:1.5;color:#2A2620;margin:24px 0 0;text-wrap:pretty;\">I wrote this because I cannot blindly trust the output of AI-generated code in my delivery. And reviewing every line by hand is too much work now,<span style=\"text-wrap-mode: initial;\">&nbsp;that should not be our job anymore. The real question is how I build trust systems so that I can rely on the output instead of re-reading it.<\u002Fspan><\u002Fp>\n      <p class=\"body\" style=\"font-size:15px;line-height:1.62;margin-top:20px;\">This playbook is how I keep the speed of AI-first delivery and still hold on to the thing that makes software trustworthy: an independent way to know it does what I said it should. The frame for the whole book is separation of powers, the way a state keeps the people who write the law, carry it out, and judge it apart so no one marks their own work. The spec is the law, the agents are the executive, and the gates and review are the judiciary. The idea underneath every page is that no branch checks itself.<\u002Fp>\n      <div style=\"display:flex;gap:6px;margin:28px 0 0;\">\n        <span style=\"width:48px;height:2px;background:#9C7A2E;\"><\u002Fspan>\n        <span style=\"width:48px;height:2px;background:#4D5159;\"><\u002Fspan>\n        <span style=\"width:48px;height:2px;background:#7B1818;\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span class=\"dia\">◆<\u002Fspan><span class=\"pg\">2<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 3 · HOW TO USE (THE LEGEND) ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">REFERENCE<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">HOW TO USE THIS PLAYBOOK<\u002Fdiv>\n    <h1 class=\"h1\">The Legend<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"lead\">This is a reference manual, not a story. Open it to the stage you are in. Every stage has the same parts, so you can run it from memory. Each part is a plain piece of any software lifecycle.<\u002Fp>\n\n    <div style=\"margin-top:20px;\">\n      <table class=\"tbl\">\n        <thead><tr><th style=\"width:170px;\">Part of each stage<\u002Fth><th>What it answers<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Setup<\u002Fstrong><\u002Ftd><td>What must already be in place before you start<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Trigger<\u002Fstrong><\u002Ftd><td>What starts the stage: the command, ticket, or event<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Execution<\u002Fstrong><\u002Ftd><td>The steps you run<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Checks<\u002Fstrong><\u002Ftd><td>The checks and decisions you make as the stage runs: CI, quality gates, review, go or no-go<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Exit criteria<\u002Fstrong><\u002Ftd><td>When you are allowed to move to the next stage<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Anti-patterns<\u002Fstrong><\u002Ftd><td>What goes wrong<\u002Ftd><\u002Ftr>\n          <tr><td><strong>References<\u002Fstrong><\u002Ftd><td>Where to go deeper<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:22px;\">Three badges run through the book, and the difference between them is the spine of the whole thing: what MUST be in place, what you SHOULD consider, and what breaks the system.<\u002Fp>\n\n    <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:10px;\">\n      <div style=\"display:flex;gap:12px;align-items:baseline;\"><span style=\"flex:none;width:62px;\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><p class=\"body\" style=\"font-size:13px;\">Marks something that must be in place. The mechanic is required, even though the tool that satisfies it is not. “Automated checks run on every change and block the merge when they fail” is a <span class=\"badge law\">LAW<\u002Fspan>. You can be held to it.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:baseline;\"><span style=\"flex:none;width:62px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p class=\"body\" style=\"font-size:13px;\">Marks a recommended tool or technique that satisfies a law. Practices are swappable. SonarQube is a <span class=\"badge practice\">PRACTICE<\u002Fspan>. The law it serves is “a static-analysis gate that blocks the merge.” Swap the tool, keep the law.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:baseline;\"><span style=\"flex:none;width:62px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p class=\"body\" style=\"font-size:13px;\">Marks a habit that quietly breaks the system.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:18px;color:#6E655A;\">That is the language to use with your team: “you missed a <span class=\"badge law\">LAW<\u002Fspan> here,” or “that is just a <span class=\"badge practice\">PRACTICE<\u002Fspan>, pick another one.”<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span class=\"dia\">◆<\u002Fspan><span class=\"pg\">3<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 4 · WHERE DO I JUMP IN ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">REFERENCE<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">FAST START<\u002Fdiv>\n    <h1 class=\"h1\">Where Do I Jump In?<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"lead\">If you are already doing some form of SDD and only want to find the gap, use the symptom on the left to find your starting section.<\u002Fp>\n\n    <div style=\"margin-top:20px;\">\n      <table class=\"tbl\">\n        <thead><tr><th style=\"width:54%;\">What you are seeing right now<\u002Fth><th>Start here<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>No constitution or <span class=\"chip\">AGENTS.md<\u002Fspan>, agents improvise every time<\u002Ftd><td><a href=\"#2-team-setup\">Foundations, §2<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>Your specs live in Jira or Confluence, not in the repo<\u002Ftd><td><a href=\"#2-team-setup\">The environment, §2.2<\u002Fa> and <a href=\"#stage-2\">Spec Authoring, §5<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You write specs, but you are not sure they can be tested<\u002Ftd><td><a href=\"#stage-2\">Spec Authoring, §5<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>Agents generate code and you still read every line yourself<\u002Ftd><td><a href=\"#stage-5\">Verification, §8<\u002Fa> and <a href=\"#stage-6\">Review, §9<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>The tests are AI-written and you do not trust them<\u002Ftd><td><a href=\"#33-gate-2\">Gate 2 and Gate 3, §3.3 and §3.4<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>Everything is green, but bugs still reach production<\u002Ftd><td><a href=\"#13-circular-validation\">Circular validation, §1.3<\u002Fa> and <a href=\"#34-gate-3\">Mutation testing, §3.4<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>It works, but you cannot prove what shipped or where it came from<\u002Ftd><td><a href=\"#39-gate-8\">Build provenance, §3.9<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You are not sure the agent is checked by anything independent<\u002Ftd><td><a href=\"#12-three-branches\">The three branches, §1.2<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You have agents but no idea how to wire them together<\u002Ftd><td><a href=\"#orchestration-loop\">The Orchestration Loop<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You have a real codebase with no specs and cannot stop the world<\u002Ftd><td><a href=\"#stage-zero\">Stage Zero<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You are worried about the token and time cost of all this<\u002Ftd><td><a href=\"#311-cost\">The Cost of the Defense, §3.11<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You want the actual prompts for these moves<\u002Ftd><td><a href=\"#appendix-h\">The Prompt Library, Appendix H<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You want to enforce the test and code split inside Spec Kit<\u002Ftd><td><a href=\"#appendix-i\">The Judiciary Preset, Appendix I<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You want the exact CI workflow for each gate<\u002Ftd><td><a href=\"#appendix-j\">The CI Gate Workflows, Appendix J<\u002Fa><\u002Ftd><\u002Ftr>\n          <tr><td>You want the command-by-command flow for a new feature<\u002Ftd><td><a href=\"#appendix-k\">Specifying a New Feature, Appendix K<\u002Fa><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span class=\"dia\">◆<\u002Fspan><span class=\"pg\">4<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 5 · TABLE OF CONTENTS ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">CONTENTS<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:38px;\">CONTENTS<\u002Fdiv>\n    <h1 class=\"h1\">Table of Contents<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:26px 40px;font-size:12.5px;line-height:1.5;\">\n      <div>\n        <div class=\"seclabel\">PART I · FIRST PRINCIPLES<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#1-philosophy\">1. The Philosophy<\u002Fa><span style=\"color:#b8b0a3;\">06<\u002Fspan><\u002Fdiv>\n\n        <div class=\"seclabel\" style=\"margin-top:18px;\">PART II · FOUNDATIONS<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#2-team-setup\">2. Team Setup<\u002Fa><span style=\"color:#b8b0a3;\">09<\u002Fspan><\u002Fdiv>\n\n        <div class=\"seclabel\" style=\"margin-top:18px;\">PART III · THE JUDICIARY<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#3-gates\">3. The Quality Gates<\u002Fa><span style=\"color:#b8b0a3;\">12<\u002Fspan><\u002Fdiv>\n\n        <div class=\"seclabel\" style=\"margin-top:18px;\">PART IV · THE CYCLE<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-zero\">Stage Zero · Existing Codebases<\u002Fa><span style=\"color:#b8b0a3;\">18<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#orchestration-loop\">The Orchestration Loop<\u002Fa><span style=\"color:#b8b0a3;\">20<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-1\">4. Stage 1 · Discovery &amp; Intent<\u002Fa><span style=\"color:#b8b0a3;\">22<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-2\">5. Stage 2 · Spec Authoring<\u002Fa><span style=\"color:#b8b0a3;\">23<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-3\">6. Stage 3 · Planning<\u002Fa><span style=\"color:#b8b0a3;\">25<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-4\">7. Stage 4 · Implementation<\u002Fa><span style=\"color:#b8b0a3;\">26<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-5\">8. Stage 5 · Verification<\u002Fa><span style=\"color:#b8b0a3;\">27<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-6\">9. Stage 6 · Review<\u002Fa><span style=\"color:#b8b0a3;\">29<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-7\">10. Stage 7 · CI/CD &amp; Release<\u002Fa><span style=\"color:#b8b0a3;\">31<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#stage-8\">11. Stage 8 · Observe &amp; Operate<\u002Fa><span style=\"color:#b8b0a3;\">32<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"seclabel\">PART V · OFF THE HAPPY PATH<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#12-two-minute-drill\">12. Emergencies &amp; Hotfixes<\u002Fa><span style=\"color:#b8b0a3;\">34<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#13-audibles\">13. When to Deviate<\u002Fa><span style=\"color:#b8b0a3;\">35<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#14-penalties\">14. The Failure Catalog<\u002Fa><span style=\"color:#b8b0a3;\">36<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#15-film-room\">15. Metrics &amp; Improvement<\u002Fa><span style=\"color:#b8b0a3;\">37<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"seclabel\" style=\"margin-top:18px;\">APPENDICES<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-a\">A. Master Config Index<\u002Fa><span style=\"color:#b8b0a3;\">38<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-b\">B. The Constitution<\u002Fa><span style=\"color:#b8b0a3;\">39<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-c\">C. The EARS Spec Template<\u002Fa><span style=\"color:#b8b0a3;\">40<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-d\">D. The <span class=\"lab\" style=\"font-size:.92em;\">AGENTS.md<\u002Fspan> Reference<\u002Fa><span style=\"color:#b8b0a3;\">41<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-e\">E. Glossary<\u002Fa><span style=\"color:#b8b0a3;\">42<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-f\">F. References<\u002Fa><span style=\"color:#b8b0a3;\">43<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-g\">G. Regulated &amp; High-Risk Work<\u002Fa><span style=\"color:#b8b0a3;\">44<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-h\">H. The Prompt Library<\u002Fa><span style=\"color:#b8b0a3;\">46<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-i\">I. The Judiciary Preset &amp; Extension<\u002Fa><span style=\"color:#b8b0a3;\">48<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-j\">J. The CI Gate Workflows<\u002Fa><span style=\"color:#b8b0a3;\">50<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;gap:10px;\"><a href=\"#appendix-k\">K. Specifying a New Feature<\u002Fa><span style=\"color:#b8b0a3;\">53<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:30px;border-top:1px solid #ECE7DD;padding-top:16px;\">\n          <div style=\"display:flex;gap:5px;\"><span style=\"width:30px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:30px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:30px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fdiv>\n          <p class=\"body\" style=\"font-size:11.5px;color:#857c70;margin-top:10px;\">Gold marks legislative work, slate the executive, oxblood the judiciary. The running header on every page names the branch in play.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span class=\"dia\">◆<\u002Fspan><span class=\"pg\">5<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 6 · PART I DIVIDER + 1.1 ============ -->\n<div class=\"page\" id=\"1-philosophy\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FIRST PRINCIPLES<\u002Fspan><\u002Fdiv>\n\n    <div style=\"margin-top:30px;display:flex;align-items:baseline;gap:16px;\">\n      <span style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:15px;color:#9C7A2E;\">Part I<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#E2D9C4;\"><\u002Fspan>\n      <span style=\"display:flex;gap:5px;\"><span style=\"width:26px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:44px;line-height:1.04;color:#211C16;margin:14px 0 0;letter-spacing:-.02em;\">First Principles<\u002Fh1>\n\n    <div style=\"margin-top:40px;\">\n      <div class=\"kick\">CHAPTER 1<\u002Fdiv>\n      <h2 class=\"h1 sm\" style=\"margin-top:9px;\">The Philosophy: Why AI-First SDD, and the One Problem It Must Solve<\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:22px;\">\n      <div class=\"seclabel\">1.1 &nbsp;THE CHANGE WE ARE RESPONDING TO<\u002Fdiv>\n      <p class=\"body\">For most of software’s history, writing the code was the expensive part. People typed it slowly, and a finished, working program was itself a kind of proof: if it ran and passed its tests, someone had understood the problem well enough to build it. The understanding came bundled with the code for free.<\u002Fp>\n      <p class=\"body\">Generative models broke that bundle. A model can now produce a working-looking program in minutes, so a passing build no longer proves that anyone understood anything. You can have running code, green tests, and no human who can explain why it is correct. The scarce thing is no longer the code. It is the confidence that the code does what you meant.<\u002Fp>\n      <p class=\"body\">AI-first SDD is organized around that change. It moves human effort to the two activities that still produce confidence: writing the specification that says what “correct” means, and building the system that checks the code against it. You stop spending your hours reading generated lines and start spending them on the spec and on the gates.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 1 · First Principles<\u002Fspan><span class=\"pg\">6<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 7 · 1.2 THREE BRANCHES ============ -->\n<div class=\"page\" id=\"12-three-branches\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FIRST PRINCIPLES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">1.2 &nbsp;THE THREE BRANCHES<\u002Fdiv>\n    <h1 class=\"h1\">Managing the Work Like a Small State<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:15px;\">Here is the lens that makes the rest of the playbook hang together. Think about how a healthy state is organized. One branch writes the law, a second carries it out, and a third judges whether what was carried out actually follows the law. The powers are kept apart on purpose, because if the same hand writes the law, enforces it, and judges it, there is nothing left to catch a mistake.<\u002Fp>\n    <p class=\"body\">A software team works the same way, and an AI-first team needs the separation even more. There are three powers:<\u002Fp>\n\n    <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"display:flex;gap:13px;\"><span style=\"width:4px;background:#9C7A2E;border-radius:2px;flex:none;\"><\u002Fspan><p class=\"body\"><strong>Legislative: the spec.<\u002Fstrong> This is the law. It states what must be true and why. It is the one artifact that carries human intent into the machine, and everything downstream is measured against it.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:13px;\"><span style=\"width:4px;background:#4D5159;border-radius:2px;flex:none;\"><\u002Fspan><p class=\"body\"><strong>Executive: the agents.<\u002Fstrong> They carry out the law. They write code, tests, migrations, and draft reviews. Fast and tireless, and not trusted to judge their own work.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:13px;\"><span style=\"width:4px;background:#7B1818;border-radius:2px;flex:none;\"><\u002Fspan><p class=\"body\"><strong>Judicial: verification.<\u002Fstrong> It judges the work against the law, using evidence the executive cannot fake. The automated gates and the human reviewer.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:12px;\">The phrase to anchor on, the one that turns this from abstract civics into something concrete, is this: <strong>the spec is the law.<\u002Fstrong> Not a suggestion, not documentation written after the fact. The thing every other stage answers to.<\u002Fp>\n    <p class=\"body\">And here is the failure this entire playbook exists to prevent:<\u002Fp>\n\n    <div class=\"note viol\" style=\"margin-top:16px;\">\n      <span class=\"nt\">The separation-of-powers collapse.<\u002Fspan> When one agent writes the spec, writes the code, writes the tests, and writes the first review, all three branches fuse into a single source. The law, the execution, and the judgment all come from the same place, so nothing independent is left to catch an error. Everything agrees with everything, because it all came from one mind.\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:13px;\">Most of what follows, the spec as an independent oracle, the deterministic gates, mutation testing, using a different model to verify than to build, is a strategy for keeping these powers apart so the collapse cannot happen.<\u002Fp>\n    <p class=\"body\">Each of the eight stages belongs to a branch.&nbsp;<span style=\"text-wrap-mode: initial;\">Discovery and Spec Authoring are legislative, since they produce the law. Planning, Implementation, and Release are executive, since they carry it out. Verification and Review are judicial, since they judge the work against the law on evidence the executive cannot fake. Observation feeds the next session of the legislature. The single failure every practice here guards against is one branch checking its own work, so whenever you are unsure a step is safe, ask which branch is acting and whether a different branch will check it.<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 1 · First Principles<\u002Fspan><span class=\"pg\">7<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 8 · 1.3 CIRCULAR VALIDATION ============ -->\n<div class=\"page\" id=\"13-circular-validation\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FIRST PRINCIPLES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">1.3 &nbsp;THE ONE PROBLEM<\u002Fdiv>\n    <h1 class=\"h1\">Circular Validation<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:15px;\">First, one word I will use constantly. An <strong>oracle<\u002Fstrong> is the independent answer key you check the work against: the thing that tells you the right answer, separately from the thing being tested. In this playbook the oracle is your human-authored spec and its acceptance criteria. It is worth keeping the word, because it gives your team a precise question to ask each other: “what is our oracle here?” means “what are we checking this against that the agent did not also write?”<\u002Fp>\n    <p class=\"body\">Now the problem. If the same model writes the code and the tests from the same reading of the spec, the tests do not check your intent. They check the model’s interpretation, against code built from that same interpretation. The answer key and the answer came from one source, so a passing suite only confirms that the code agrees with itself. A misreading of the spec lands in the code and in the tests identically, and nothing flags it.<\u002Fp>\n    <p class=\"body\">This is measurable, not theoretical. A 2026 study of 470 pull requests found that reviewers spent 91% more time on AI-generated code, and that the code carried roughly three times the readability problems and 75% more logic errors than human-written code. The familiar reassurance, “it compiles and the tests pass,” is exactly where this hides. You can sit at 92% coverage with a clean security scan and still ship a logic bug the agent introduced, because the tests were written to agree with the buggy code.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:6px;\"><strong>Four moves break the loop.<\u002Fstrong> The rest of the playbook is these four worked out in detail.<\u002Fp>\n    <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"display:flex;gap:12px;\"><span class=\"lab\" style=\"color:#9C7A2E;font-weight:600;flex:none;font-size:13px;\">1<\u002Fspan><p class=\"body\"><strong>An oracle the agent cannot author.<\u002Fstrong> The spec, written as testable acceptance criteria by a human, is the answer key. Tests are derived from it, <strong>not<\u002Fstrong> from the implementation. A test written by reading the finished code is not an oracle. It is a mirror.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;\"><span class=\"lab\" style=\"color:#9C7A2E;font-weight:600;flex:none;font-size:13px;\">2<\u002Fspan><p class=\"body\"><strong>Deterministic gates.<\u002Fstrong> Type checkers, static analysis, dependency and secret scanners, and build provenance give the same verdict no matter which model wrote the code. There is no judgment in them for an agent to argue with.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;\"><span class=\"lab\" style=\"color:#9C7A2E;font-weight:600;flex:none;font-size:13px;\">3<\u002Fspan><p class=\"body\"><strong>Test the tests with mutation testing.<\u002Fstrong> Coverage tells you a line of code ran during the tests. It does not tell you the test would have noticed if that line were wrong. Mutation testing changes the code on purpose, for example flipping a <span class=\"chip\">&gt;<\u002Fspan> to <span class=\"chip\">&gt;=<\u002Fspan>, then reruns the tests. If no test fails, the test was running the code without actually checking it, and you have found a hole that coverage reported as solid.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;\"><span class=\"lab\" style=\"color:#9C7A2E;font-weight:600;flex:none;font-size:13px;\">4<\u002Fspan><p class=\"body\"><strong>Independence at verification and review.<\u002Fstrong> Use a different model to verify and review than the one that wrote the code, so their blind spots do not line up. That model diversity is a security layer in its own right (see <a href=\"#stage-5\">§8<\u002Fa>). Then spend human attention on the residual that no gate can express: architecture, intent, judgment.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 1 · First Principles<\u002Fspan><span class=\"pg\">8<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 9 · 1.4 WHAT CHANGES ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FIRST PRINCIPLES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">1.4 &nbsp;WHAT CHANGES, AND WHAT DOES NOT<\u002Fdiv>\n    <h1 class=\"h1\">The Shift, in One Table<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:20px;\">\n      <table class=\"tbl\">\n        <thead><tr><th style=\"width:24%;\"><\u002Fth><th style=\"width:36%;\">Before AI-first<\u002Fth><th>AI-first SDD<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Where humans spend judgment<\u002Fstrong><\u002Ftd><td>Reading code line by line<\u002Ftd><td>Writing the spec, building the gates, reviewing the evidence and the residual<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Source of truth<\u002Fstrong><\u002Ftd><td>The code (the spec was scaffolding)<\u002Ftd><td>The spec (executable, versioned). The code is an output<\u002Ftd><\u002Ftr>\n          <tr><td><strong>What “done” means<\u002Fstrong><\u002Ftd><td>“I read it and it looks right”<\u002Ftd><td>“It cleared an oracle I wrote and gates the agent cannot fake”<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Main risk<\u002Fstrong><\u002Ftd><td>Slow delivery<\u002Ftd><td>Misplaced trust and review overload at high volume<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Traceability<\u002Fstrong><\u002Ftd><td>Implicit, in people’s heads<\u002Ftd><td>Explicit: spec, task, commit, test, build provenance<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:22px;\">One thing does not change. You were never 100% certain with hand-written code either. People test against their own blind spots, and large diffs get rubber-stamped. The goal was never proof of correctness. It is assurance that fits the risk, with more than one layer behind it. A marketing page and an authentication service should not be checked the same way, and in this playbook they are not (see <a href=\"#13-audibles\">§13<\u002Fa> and <a href=\"#33-gate-2\">§3.3<\u002Fa>).<\u002Fp>\n\n    <div style=\"margin-top:auto;border-top:1px solid #ECE7DD;padding-top:13px;\">\n      <p class=\"body\" style=\"font-size:12px;color:#857c70;\"><span class=\"lab\" style=\"letter-spacing:.1em;color:#9C7A2E;\">REFERENCES<\u002Fspan> &nbsp;·&nbsp; <a href=\"#appendix-f\">Appendix F<\u002Fa>, Part I.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 1 · First Principles<\u002Fspan><span class=\"pg\">9<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 10 · PART II DIVIDER + 2.1 ============ -->\n<div class=\"page\" id=\"2-team-setup\" style=\"--accent:#4D5159;--rule:#7B7F86;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FOUNDATIONS<\u002Fspan><\u002Fdiv>\n\n    <div style=\"margin-top:30px;display:flex;align-items:baseline;gap:16px;\">\n      <span style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:15px;color:#4D5159;\">Part II<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#D7DBE0;\"><\u002Fspan>\n      <span style=\"display:flex;gap:5px;\"><span style=\"width:26px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:44px;line-height:1.04;color:#211C16;margin:14px 0 0;letter-spacing:-.02em;\">Foundations<\u002Fh1>\n\n    <div style=\"margin-top:36px;\">\n      <div class=\"kick\">CHAPTER 2<\u002Fdiv>\n      <h2 class=\"h1 sm\" style=\"margin-top:9px;\">Team Setup: Roles, Environment, and Rulebook<\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n      <p class=\"body\" style=\"margin-top:14px;\">You do not start building before the team and the repository are ready. This setup, done once per project, is what every stage afterward assumes.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:20px;\">\n      <div class=\"seclabel\">2.1 &nbsp;THE THREE BRANCHES AND THEIR ROLES<\u002Fdiv>\n      <p class=\"body\">An AI-first team is organized like a small state, and most of the hands-on work is done by agents, often a dozen or more, each specialized for one job. Organize them by branch, because the branch tells you who is allowed to check whom.<\u002Fp>\n      <div style=\"margin-top:13px;\">\n        <table class=\"tbl\">\n          <thead><tr><th style=\"width:16%;\">Branch<\u002Fth><th style=\"width:22%;\">Role<\u002Fth><th style=\"width:32%;\">Who or what<\u002Fth><th>Rule<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td><strong style=\"color:#9C7A2E;\">Legislative<\u002Fstrong><\u002Ftd><td>Author and approve the law<\u002Ftd><td>The human lead, with a spec agent and a clarifier<\u002Ftd><td>A human approves the spec before it governs anything<\u002Ftd><\u002Ftr>\n            <tr><td><strong style=\"color:#4D5159;\">Executive<\u002Fstrong><\u002Ftd><td>Carry out the law<\u002Ftd><td>A squad of agents: planner, task decomposer, one or more coders, a migration agent, a docs agent<\u002Ftd><td>The executive never judges its own output<\u002Ftd><\u002Ftr>\n            <tr><td><strong style=\"color:#7B1818;\">Judiciary<\u002Fstrong><\u002Ftd><td>Judge the work against the law<\u002Ftd><td>The deterministic CI gates, a review agent on a different model family, and the human approver<\u002Ftd><td>Judges on evidence the executive cannot author or fake<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <p class=\"body\" style=\"margin-top:14px;\">The human lead sits in two branches on purpose: they author the law and hold final judicial authority. That is allowed, because a person reviewing an agent’s work is still an independent check. What is never allowed is the executive judging itself. The agent that wrote the code is not the authority that clears it, and a second agent from the same model family barely counts as a second opinion (see <a href=\"#13-circular-validation\">§1.3<\u002Fa>).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 2 · Foundations<\u002Fspan><span class=\"pg\">10<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 11 · 2.2 ENVIRONMENT ============ -->\n<div class=\"page\" style=\"--accent:#4D5159;--rule:#7B7F86;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FOUNDATIONS<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">2.2 &nbsp;THE ENVIRONMENT<\u002Fdiv>\n    <h1 class=\"h1\">A Repository Built for Agents<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:15px;\">Some of this is ordinary professional practice you already had before AI. The point of this setup is to separate the baseline you can assume from the few things AI-first genuinely adds.<\u002Fp>\n\n    <div class=\"note\" style=\"margin-top:14px;\">\n      <span class=\"nt\">Baseline you already had.<\u002Fspan> Version control with a protected default branch, continuous integration, and a pinned, reproducible toolchain are standard software hygiene. They are not new, and you should expect them.<\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:16px;font-weight:600;color:#211C16;\">What AI-first adds:<\u002Fp>\n    <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:11px;\">\n      <div class=\"mkrow\" style=\"display:flex;gap:13px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"lab\" style=\"color:#4D5159;font-weight:600;flex:none;\">01<\u002Fspan><p class=\"body\"><strong>A repository configured for agents<\u002Fstrong>. The repo, not just a CI server, is the agent’s working environment. That means agent-readable rules in the tree (see <a href=\"#23-rulebook\">§2.3<\u002Fa>), local hooks that can stop a bad action before it is committed, and fast static checks an agent can run itself between steps. The repository has to be legible to a machine that is editing it.<\u002Fp><\u002Fdiv>\n      <div class=\"mkrow\" style=\"display:flex;gap:13px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"lab\" style=\"color:#4D5159;font-weight:600;flex:none;\">02<\u002Fspan><p class=\"body\"><strong>Automated checks on every change, every time<\u002Fstrong>. Not “CI exists,” which you already had, but a pipeline that re-checks the work after every generation, without anyone remembering to ask. Agents produce constantly, so the checking has to be constant and unskippable, not a step a human decides to run.<\u002Fp><\u002Fdiv>\n      <div class=\"mkrow\" style=\"display:flex;gap:13px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"lab\" style=\"color:#4D5159;font-weight:600;flex:none;\">03<\u002Fspan><p class=\"body\"><strong>The repository owns the spec<\u002Fstrong>. This is the real shift. The source of truth for what the software should do lives in the repo, version-controlled next to the code, not in a ticketing tool like Jira that drifts out of sync. You can still connect Jira or Confluence, and many teams do, but the repo holds the authoritative spec. A <span class=\"chip\">specs/<\u002Fspan> directory is a first-class part of the source tree, not a wiki page that rots.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 2 · Foundations<\u002Fspan><span class=\"pg\">11<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 12 · 2.3 RULEBOOK ============ -->\n<div class=\"page\" id=\"23-rulebook\" style=\"--accent:#4D5159;--rule:#7B7F86;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FOUNDATIONS<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">2.3 &nbsp;THE RULEBOOK<\u002Fdiv>\n    <h1 class=\"h1\">How Agents Stay Inside Your System<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:14px;\">Three written artifacts keep agents following your conventions instead of improvising. They are necessary, but they are not the whole story, and the second half of this section covers what teams usually forget.<\u002Fp>\n\n    <div style=\"margin-top:12px;display:flex;flex-direction:column;gap:9px;\">\n      <p class=\"body mkrow\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><strong>The Constitution<\u002Fstrong>. A short, versioned file of non-negotiable principles every agent obeys at every stage: testing posture, architectural rules, security defaults, performance budgets. It is the part of the law that does not get rewritten per feature, which is what gives you consistency across time and across different models. Template in <a href=\"#appendix-b\">Appendix B<\u002Fa>.<\u002Fp>\n      <p class=\"body mkrow\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><strong><span class=\"chip\">AGENTS.md<\u002Fspan>, the README for machines<\u002Fstrong>. The open standard (stewarded under the Linux Foundation) for handing an agent the project’s build, test, and lint commands, its version constraints, and its non-standard patterns. It is read natively by most coding agents, including Copilot, Codex, Cursor, and Claude Code, so you write the rules once. Keep it commands-first, pin versions explicitly, and keep it short. Template in <a href=\"#appendix-d\">Appendix D<\u002Fa>.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"note viol mkrow\" style=\"margin-top:12px;\"><span class=\"mk\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan>\n      <span class=\"nt\">Treating <span class=\"chip\">AGENTS.md<\u002Fspan> as enforcement.<\u002Fspan> These files are advisory. An agent may ignore them. They make the right behavior more likely; they do not guarantee it. Guidance lives in the rulebook, enforcement lives in the gates (<a href=\"#3-gates\">Part III<\u002Fa>). Never confuse the two.\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:13px;font-weight:600;color:#211C16;\">What the rulebook alone does not cover.<\u002Fp>\n    <div style=\"margin-top:9px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"display:flex;gap:12px;\"><span style=\"color:#4D5159;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\"><strong>Context and memory management.<\u002Fstrong> An agent only follows your system if the relevant rules are actually in its context when it acts. As work grows, context fills, and the model starts dropping the rules at the bottom. You need a deliberate strategy for what stays in context, what gets summarized into memory, and what gets reloaded per task, or the constitution silently stops being read.<\u002Fp><\u002Fdiv>\n      <div class=\"mkrow\" style=\"display:flex;gap:12px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span style=\"color:#4D5159;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\"><strong>Evaluation of your agents<\u002Fstrong>. Your prompts, skills, and constitution are themselves software, and they need their own regression tests. Change one line of a system prompt and an agent can behave differently across dozens of tasks. Keep a small evaluation set of representative tasks and run your agents against it whenever you change a prompt, a skill, or a constitution rule, the same way you would run tests after changing code. An unevaluated prompt change is an untested code change.<\u002Fp><\u002Fdiv>\n      <div class=\"mkrow\" style=\"display:flex;gap:12px;\"><span class=\"mk\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><span style=\"color:#4D5159;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\"><strong>Skills and hooks<\u002Fstrong>. Reusable, portable procedures (skills) reduce drift by encoding “how we do X” once. Hooks are the one place an agent can be blocked locally, before an action happens. Useful, but still not the real gate. CI is the only layer that guarantees anything.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 2 · Foundations<\u002Fspan><span class=\"pg\">12<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 13 · 2.4 TRUST PYRAMID + 2.5 ============ -->\n<div class=\"page\" style=\"--accent:#4D5159;--rule:#7B7F86;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">FOUNDATIONS<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">2.4 &nbsp;THE TRUST PYRAMID<\u002Fdiv>\n    <h1 class=\"h1\">Only the Top Layer Guarantees<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:36px;display:flex;flex-direction:column;align-items:center;gap:6px;\" data-om-raster=\"\">\n      <div style=\"display:flex;align-items:center;gap:16px;width:100%;justify-content:center;\">\n        <div style=\"width:300px;text-align:center;background:#7B1818;color:#FCFBF8;border-radius:5px;padding:11px 12px;\"><div class=\"lab\" style=\"font-size:12px;letter-spacing:.06em;font-weight:600;\">CI GATES · immutable<\u002Fdiv><div style=\"font-size:10.5px;opacity:.82;margin-top:2px;\">deterministic CI gates<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:200px;font-size:11px;color:#7B1818;font-weight:600;text-align:left;\">← the only thing that BLOCKS a merge<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;width:100%;justify-content:center;\">\n        <div style=\"width:370px;text-align:center;background:#E7DECB;color:#3A332C;border-radius:5px;padding:10px 12px;\"><div class=\"lab\" style=\"font-size:12px;letter-spacing:.04em;font-weight:600;\">HOOKS · local, blocking<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:200px;font-size:11px;color:#6E655A;text-align:left;\">← fast tripwire, agent-side<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;width:100%;justify-content:center;\">\n        <div style=\"width:440px;text-align:center;background:#EDE6D6;color:#3A332C;border-radius:5px;padding:10px 12px;\"><div class=\"lab\" style=\"font-size:12px;letter-spacing:.04em;font-weight:600;\">SKILLS · repeatable how<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:200px;font-size:11px;color:#6E655A;text-align:left;\">← reduces drift<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;width:100%;justify-content:center;\">\n        <div style=\"width:510px;text-align:center;background:#F2ECDD;color:#3A332C;border:1px solid #E2D9C4;border-radius:5px;padding:10px 12px;\"><div class=\"lab\" style=\"font-size:12px;letter-spacing:.04em;font-weight:600;\">AGENTS.md / Constitution<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:200px;font-size:11px;color:#6E655A;text-align:left;\">← guidance, advisory<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"cap\" style=\"text-align:center;margin-top:12px;\">Trust rises as you go up. Only the top layer is a guarantee.<\u002Fp>\n\n    <div class=\"sec\" style=\"margin-top:30px;\">\n      <div class=\"seclabel\">2.5 &nbsp;EXIT CRITERIA — THE FOUNDATIONS ARE IN PLACE WHEN<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:6px;\">\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\">The repository is configured for agents, with rules in the tree and local hooks in place. See <a href=\"#2-team-setup\">§2.2<\u002Fa>.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\">Automated checks run on every change and block the merge when they fail. See <a href=\"#3-gates\">Part III<\u002Fa>.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\">The authoritative spec lives in a versioned <span class=\"chip\">specs/<\u002Fspan> directory, not in a ticketing tool. See <a href=\"#2-team-setup\">§2.2<\u002Fa>.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\">The constitution is written. See <a href=\"#appendix-b\">Appendix B<\u002Fa>.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\"><span class=\"chip\">AGENTS.md<\u002Fspan> is written, commands-first, with versions pinned. See <a href=\"#appendix-d\">Appendix D<\u002Fa>.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#4D5159;flex:none;\">◆<\u002Fspan><p class=\"body\" style=\"font-size:13px;\">You have an evaluation set for your agents and run it when prompts or rules change. See <a href=\"#23-rulebook\">§2.3<\u002Fa>.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;border-top:1px solid #ECE7DD;padding-top:13px;\">\n      <p class=\"body\" style=\"font-size:12px;color:#857c70;\"><span class=\"lab\" style=\"letter-spacing:.1em;color:#4D5159;\">REFERENCES<\u002Fspan> &nbsp;·&nbsp; <a href=\"#appendix-f\">Appendix F<\u002Fa>, Part II.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 2 · Foundations<\u002Fspan><span class=\"pg\">13<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 14 · PART III DIVIDER + CH3 OPENER ============ -->\n<div class=\"page\" id=\"3-gates\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n\n    <div style=\"margin-top:30px;display:flex;align-items:baseline;gap:16px;\">\n      <span style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:15px;color:#7B1818;\">Part III<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#E5CECE;\"><\u002Fspan>\n      <span style=\"display:flex;gap:5px;\"><span style=\"width:26px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:42px;line-height:1.04;color:#211C16;margin:14px 0 0;letter-spacing:-.02em;\">The Judiciary — The Gates<\u002Fh1>\n\n    <div style=\"margin-top:30px;\">\n      <div class=\"kick\">CHAPTER 3<\u002Fdiv>\n      <h2 class=\"h1 sm\" style=\"margin-top:9px;\">The Quality Gates: What Must Hold, and Why<\u002Fh2>\n      <div class=\"rule\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:15px;\">This is the defense. Each gate is a <span class=\"badge law\">LAW<\u002Fspan>, a mechanic that must be present, even though the tool that provides it is a <span class=\"badge practice\">PRACTICE<\u002Fspan> you can swap.<\u002Fp>\n    <p class=\"body\"><strong>Are these the right gates? Can you defend them?<\u002Fstrong> Yes. This is not an invented list. It is layered defense in depth, where each gate covers one failure class that none of the others can catch. Lint and types catch malformed code. Tests against the spec catch wrong behavior. Mutation testing catches weak tests. Static analysis catches insecure code. Dependency and secret scanning catch what you pulled in and what you leaked. The conformance gate catches drift from intent. Provenance catches a tampered or unidentifiable build. Remove any one and a specific, nameable kind of defect walks through. You tune strictness by risk tier (<a href=\"#33-gate-2\">§3.3<\u002Fa>), not by dropping gates.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:11px;\">The gates run cheapest-first, so feedback arrives in the order an agent can act on it:<\u002Fp>\n    <div class=\"gmap\" style=\"margin-top:11px;\">\n      <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px;\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);\">The Nine Gates<\u002Fspan>\n        <span style=\"flex:1;display:flex;align-items:center;gap:5px;\"><span style=\"flex:1;height:1px;background:#E5CECE;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#9a9186;\">cheapest&nbsp;first →<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:9px;\">\n\n        <a href=\"#gate-0\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;0<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">seconds<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Format &amp; lint<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">deterministic<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#gate-1\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;1<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">seconds<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Type check<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">deterministic<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#33-gate-2\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1.5px solid var(--rule);border-radius:7px;background:#FBF3F2;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--accent);border-radius:3px;padding:1.5px 6px;\">GATE&nbsp;2<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#9a7a72;\">1-3 min<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Tests vs the spec<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:var(--accent);\">oracle-bearing<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#34-gate-3\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1.5px solid var(--rule);border-radius:7px;background:#FBF3F2;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--accent);border-radius:3px;padding:1.5px 6px;\">GATE&nbsp;3<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#9a7a72;\">2-5 min<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Mutation (high-risk)<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:var(--accent);\">tests the tests<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#gate-4\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;4<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">minutes<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Static analysis (SAST)<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">deterministic<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#gate-5\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;5<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">seconds<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Dependency scanning<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">deterministic<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#gate
