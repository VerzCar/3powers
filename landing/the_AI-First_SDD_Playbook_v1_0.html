-6\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;6<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">seconds<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Secret scanning<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">deterministic<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#37-gate-7\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1.5px solid var(--rule);border-radius:7px;background:#FBF3F2;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:#fff;background:var(--accent);border-radius:3px;padding:1.5px 6px;\">GATE&nbsp;7<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#9a7a72;\">varies<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Spec conformance<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:var(--accent);\">ties code to intent<\u002Fdiv>\n        <\u002Fa>\n\n        <a href=\"#39-gate-8\" style=\"text-decoration:none;display:flex;flex-direction:column;gap:5px;padding:10px 11px 11px;border:1px solid #E2D9C4;border-radius:7px;background:#FCFBF8;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:700;letter-spacing:.1em;color:var(--accent);background:transparent;border:1px solid var(--rule);border-radius:3px;padding:1.5px 5px;\">GATE&nbsp;8<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:#857c70;\">seconds<\u002Fspan><\u002Fdiv>\n          <div style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:12.5px;color:#211C16;line-height:1.12;\">Build provenance<\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.02em;color:#857c70;\">supply chain<\u002Fdiv>\n        <\u002Fa>\n\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:9px;\">\n        <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:3px;background:var(--accent);flex:none;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.04em;color:#6E655A;\">oracle-bearing — breaks circular validation<\u002Fspan><\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:3px;border:1px solid var(--rule);flex:none;\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:8.5px;letter-spacing:.04em;color:#6E655A;\">deterministic hygiene<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:12px;\">Three gates do the real work against circular validation: Gate 2, Gate 3, and Gate 7. The rest are deterministic hygiene the agent cannot talk past. You need both kinds.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">14<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 15 · GATE 0 + GATE 1 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.1 – 3.2 &nbsp;THE DETERMINISTIC FLOOR<\u002Fdiv>\n    <h1 class=\"h1\">Format, Lint &amp; Types<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:24px;\">\n      <div class=\"ghead mkrow\" id=\"gate-0\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 0<\u002Fspan><h3 class=\"gh\">Format &amp; Lint<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>Automatic formatting and static lint rules, run before anyone looks at a diff.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>It removes a whole class of trivial bugs and, just as important, it keeps diffs readable. At AI volume, an unreadable diff is an unreviewed diff.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>ESLint with Prettier (TypeScript), Ruff (Python).<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>Zero lint errors, formatter reports no changes.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>An agent silencing a rule inline to make the gate pass. Flag every new disable comment.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:26px;border-top:1px solid #ECE7DD;padding-top:24px;\">\n      <div class=\"ghead mkrow\" id=\"gate-1\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 1<\u002Fspan><h3 class=\"gh\">Type Checking<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>A strict type check across the change.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>Types are the cheapest correctness check that exists, and they catch the thing agents do most: confidently calling an API that does not exist or passing the wrong shape.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p><span class=\"chip\">tsc<\u002Fspan> in strict mode (TypeScript), mypy or pyright in strict mode (Python).<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>No type errors in strict mode.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>New <span class=\"chip\">any<\u002Fspan> or <span class=\"chip\">type: ignore<\u002Fspan> sprinkled to quiet the checker. A suppression is the agent telling you it does not understand the contract.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">15<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 16 · GATE 2 ============ -->\n<div class=\"page\" id=\"33-gate-2\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <span id=\"gate-2\" style=\"position:absolute;top:0;\"><\u002Fspan>\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.3 &nbsp;GATE&nbsp;2&nbsp;&nbsp;·&nbsp;&nbsp;THE FIRST ORACLE<\u002Fdiv>\n    <div class=\"mkrow\" style=\"display:flex;align-items:center;gap:14px;margin-top:10px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><h1 class=\"h1\" style=\"margin:0;\">Tests Against the Spec<\u002Fh1><\u002Fdiv>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:14px;\">The first oracle-bearing gate. It only breaks circular validation if some of the tests come from the human-authored acceptance criteria, <strong>not<\u002Fstrong> from the implementation. That single condition is what separates a real test from a mirror.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:10px;font-weight:600;color:#211C16;\">Three rules make this gate real, each with the failure it prevents:<\u002Fp>\n    <div style=\"margin-top:9px;display:flex;flex-direction:column;gap:8px;\">\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#7B1818;font-weight:600;flex:none;font-size:12px;\">1<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><strong>Write at least one test per acceptance criterion, derived from the spec.<\u002Fstrong> The spec says “a withdrawal equal to the full balance is allowed and leaves a balance of exactly zero.” The test asserts that outcome, written from the sentence, before or separately from the code. <em>Prevents<\u002Fem> a test that simply restates whatever the code already does.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#7B1818;font-weight:600;flex:none;font-size:12px;\">2<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><strong>Measure coverage on the changed lines, not the whole repo.<\u002Fstrong> The repo sits at 85% overall while the new module sits at 40%, hidden in the average. Gating on the diff exposes it. <em>Prevents<\u002Fem> new AI code hiding inside an old, healthy number.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#7B1818;font-weight:600;flex:none;font-size:12px;\">3<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><strong>Use property-based tests for anything that parses, validates, or transforms input.<\u002Fstrong> Instead of three hand-picked strings, generate thousands of random inputs and assert the output is always URL-safe. <em>Prevents<\u002Fem> the agent only testing the happy path it was thinking of.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"gcard\" style=\"margin-top:12px;\">\n      <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>fast-check (TypeScript), Hypothesis (Python).<\u002Fp>\n      <span class=\"gl\">Good<\u002Fspan><p>Diff coverage meets the tier threshold, every acceptance test passes, and property tests exist where input is handled.<\u002Fp>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:13px;font-weight:600;color:#211C16;\">Tune strictness by risk tier, do not drop gates:<\u002Fp>\n    <div style=\"margin-top:8px;\">\n      <table class=\"tbl\" style=\"font-size:11.5px;\">\n        <thead><tr><th style=\"width:13%;\">Tier<\u002Fth><th style=\"width:35%;\">Examples<\u002Fth><th>Diff coverage<\u002Fth><th>Property tests<\u002Fth><th>Mutation (G3)<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong style=\"color:#7B1818;\">High-risk<\u002Fstrong><\u002Ftd><td>auth, payments, money math, access control, anything in <a href=\"#appendix-g\">Appendix G<\u002Fa> scope<\u002Ftd><td>≥ 90%<\u002Ftd><td>required<\u002Ftd><td>required, ≥ 80<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Standard<\u002Fstrong><\u002Ftd><td>most product features<\u002Ftd><td>≥ 80%<\u002Ftd><td>for input handling<\u002Ftd><td>nightly<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Cosmetic<\u002Fstrong><\u002Ftd><td>docs, copy, styling, internal tooling<\u002Ftd><td>best effort<\u002Ftd><td>no<\u002Ftd><td>no<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"gcard\" style=\"margin-top:12px;\">\n      <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>Coverage theater, where the line runs but the only assertion is “it did not throw.” That is Gate 3’s job to expose.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">16<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 17 · GATE 3 + GATE 4 ============ -->\n<div class=\"page\" id=\"34-gate-3\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.4 – 3.5 &nbsp;TESTING THE TESTS, AND THE CODE<\u002Fdiv>\n    <h1 class=\"h1\">Mutation &amp; Static Analysis<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:22px;\">\n      <div class=\"ghead mkrow\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 3<\u002Fspan><h3 class=\"gh\">Mutation Testing — the tests for your tests<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>A check on whether your tests would actually notice a bug.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>The direct answer to “the agent wrote the tests too, so why trust them?” Coverage proves a line ran during testing. It does not prove a test would fail if that line were wrong. Mutation testing introduces a small fault on purpose, for example flipping <span class=\"chip\">&gt;<\u002Fspan> to <span class=\"chip\">&gt;=<\u002Fspan> or deleting a guard clause, then reruns the suite. If every test still passes, the test was executing that code without checking it. A surviving mutant is a real to-do: add the missing assertion.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>Stryker (TypeScript), mutmut (Python).<\u002Fp>\n        <span class=\"gl\">Cost<\u002Fspan><p><span class=\"badge law\">LAW<\u002Fspan> &nbsp;Mutation testing is expensive, so scope it to changed or high-risk files on a pull request, two to five minutes, and run the full sweep nightly. Do not run it on prototypes or fast-churning code, where it is only noise.<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>Mutation score ≥ 80 on high-risk paths, with no un-triaged survivors there.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>Running it everywhere, drowning in noise, then turning it off. Scope it or lose it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:22px;border-top:1px solid #ECE7DD;padding-top:20px;\">\n      <div class=\"ghead mkrow\" id=\"gate-4\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 4<\u002Fspan><h3 class=\"gh\">Static Analysis (SAST)<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>Semantic scanning for vulnerability patterns: injection, broken authentication, unsafe deserialization, tainted data flows.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>Agents reproduce insecure patterns from their training data, and they now edit CI workflow files too, which a good scanner also checks. This is deterministic: the same finding regardless of which model wrote the code.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>CodeQL and SonarQube, optionally Semgrep or Snyk Code.<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>No new high-severity findings introduced by the change.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>Dismissing alerts in bulk to clear the board. Each dismissal needs a reason and a reviewer.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">17<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 18 · GATE 5 + GATE 6 ============ -->\n<div class=\"page\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.6 – 3.7 &nbsp;WHAT YOU PULLED IN, WHAT YOU LEAKED<\u002Fdiv>\n    <h1 class=\"h1\">Dependency &amp; Secret Scanning<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:24px;\">\n      <div class=\"ghead mkrow\" id=\"gate-5\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 5<\u002Fspan><h3 class=\"gh\">Dependency Scanning<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>A check on the packages a change pulls in.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>Agents add dependencies eagerly and sometimes invent package names that do not exist, which attackers register on purpose to get their code pulled in. This gate blocks known-vulnerable and unreviewed dependencies as they arrive.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>Dependabot with the dependency-review action, or Renovate, or Snyk.<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>No new high-severity vulnerable dependencies, license policy satisfied.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>Auto-merging dependency bumps without running the rest of the gates on them. They are code changes.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:26px;border-top:1px solid #ECE7DD;padding-top:24px;\">\n      <div class=\"ghead mkrow\" id=\"gate-6\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><span class=\"gnum\">GATE 6<\u002Fspan><h3 class=\"gh\">Secret Scanning<\u002Fh3><\u002Fdiv>\n      <div class=\"gcard\">\n        <span class=\"gl\">What<\u002Fspan><p>Detection of credentials in the diff, ideally blocking the push before the secret enters history.<\u002Fp>\n        <span class=\"gl\">Why<\u002Fspan><p>A secret committed to a public repo is compromised within minutes, and agents occasionally paste keys into config or fixtures.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p>Native push protection on your host, or gitleaks and trufflehog in CI and as a pre-commit hook.<\u002Fp>\n        <span class=\"gl\">Good<\u002Fspan><p>No detected secrets, push protection on.<\u002Fp>\n        <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>“It is only a test key.” Rotate and remove it anyway.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">18<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 19 · GATE 7 SPEC CONFORMANCE ============ -->\n<div class=\"page\" id=\"37-gate-7\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.8 &nbsp;GATE&nbsp;7&nbsp;&nbsp;·&nbsp;&nbsp;THE TRACEABILITY SPINE<\u002Fdiv>\n    <div class=\"mkrow\" style=\"display:flex;align-items:center;gap:14px;margin-top:10px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><h1 class=\"h1\" style=\"margin:0;\">Spec Conformance<\u002Fh1><\u002Fdiv>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:14px;\">The gate that ties the code back to the law. The other gates prove the code is well-formed, secure, and tested. This one proves it was tested <strong>against the spec<\u002Fstrong>, and that every requirement maps to a task, a test, and a commit. It is your traceability spine.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:10px;\"><strong>This is framework-agnostic.<\u002Fstrong> The mechanic is “every requirement has a linked test, and nothing is orphaned.” You do not need a particular tool to get it. I recommend a spec-driven toolkit such as Spec Kit, which gives you ready-made analysis commands (it can check, before you implement, that every requirement has a task and flag the ones that do not), but that is a convenience, not a requirement. The simplest version is a short script you own.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:10px;\">Tag each test with its requirement ID, then let CI fail when any requirement has no matching test. The whole check is about forty lines and fully deterministic:<\u002Fp>\n\n    <pre class=\"code\" style=\"margin-top:10px;font-size:10.5px;\"><span style=\"color:#9a9186;\"># tools/spec_trace.py : fails CI if any requirement has no linked test<\u002Fspan>\nimport re, sys, pathlib\nspec = next(pathlib.Path(<span style=\"color:#7B6A2E;\">\"specs\"<\u002Fspan>).rglob(<span style=\"color:#7B6A2E;\">\"spec.md\"<\u002Fspan>)).read_text()\nreqs = set(re.findall(r<span style=\"color:#7B6A2E;\">'\\b((?:FR|NFR)-\\d+)\\b'<\u002Fspan>, spec))\ntested = set()\nfor p in pathlib.Path(<span style=\"color:#7B6A2E;\">\"tests\"<\u002Fspan>).rglob(<span style=\"color:#7B6A2E;\">\"*\"<\u002Fspan>):\n    if p.is_file():\n        tested |= set(re.findall(r<span style=\"color:#7B6A2E;\">'\\b((?:FR|NFR)-\\d+)\\b'<\u002Fspan>, p.read_text(errors=<span style=\"color:#7B6A2E;\">\"ignore\"<\u002Fspan>)))\nmissing = reqs - tested\nprint(f<span style=\"color:#7B6A2E;\">\"{len(reqs)} requirements, {len(tested)} referenced in tests\"<\u002Fspan>)\nif missing:\n    print(<span style=\"color:#7B6A2E;\">\"UNTESTED REQUIREMENTS:\"<\u002Fspan>, <span style=\"color:#7B6A2E;\">\", \"<\u002Fspan>.join(sorted(missing)))\n    sys.exit(<span style=\"color:#8C2626;\">1<\u002Fspan>)<\u002Fpre>\n\n    <div class=\"gcard\" style=\"margin-top:14px;\">\n      <span class=\"gl\">Good<\u002Fspan><p>Zero untested requirements, and a human sign-off on the spec recorded before implementation began (see <a href=\"#stage-2\">§5<\u002Fa>).<\u002Fp>\n      <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>The vibe-spec. A one-line prompt expands into a spec, tests are generated from that spec, and no human ever reviewed the spec. That is the separation-of-powers collapse with the oracle deleted.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">19<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 20 · GATE 8 BUILD PROVENANCE ============ -->\n<div class=\"page\" id=\"39-gate-8\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.9 &nbsp;GATE&nbsp;8&nbsp;&nbsp;·&nbsp;&nbsp;THE SUPPLY CHAIN<\u002Fdiv>\n    <div class=\"mkrow\" style=\"display:flex;align-items:center;gap:14px;margin-top:10px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan><h1 class=\"h1\" style=\"margin:0;\">Build Provenance<\u002Fh1><\u002Fdiv>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:14px;\">A signed, verifiable record of where a build came from: this exact artifact, identified by its hash, was built by this pipeline run, from this commit, in this repository, with this list of dependencies.<\u002Fp>\n\n    <p class=\"body\" style=\"margin-top:10px;\"><strong>Why it matters, in plain terms.<\u002Fstrong> Once software leaves your laptop, a chain of machines touches it before it reaches a user, and any link can be swapped. Provenance answers a question you will eventually have to answer for real: <em>can you prove the thing running in production is the thing you built, and not something altered along the way?<\u002Fem> Three moments make it concrete:<\u002Fp>\n\n    <div style=\"margin-top:10px;display:flex;flex-direction:column;gap:8px;\">\n      <div style=\"display:flex;gap:11px;\"><span style=\"color:#7B1818;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\" style=\"font-size:13px;\"><strong>During an incident.<\u002Fstrong> A vulnerable build is in production. Without provenance you are guessing which commit and which dependencies it contains. With it, you read the answer off the artifact in seconds.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span style=\"color:#7B1818;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\" style=\"font-size:13px;\"><strong>During a supply-chain attack.<\u002Fstrong> Attackers increasingly target the build pipeline rather than the source, slipping in a step that injects code. A verified provenance record means a tampered artifact fails verification at the deploy gate instead of shipping.<\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span style=\"color:#7B1818;flex:none;font-weight:700;\">·<\u002Fspan><p class=\"body\" style=\"font-size:13px;\"><strong>For accountability.<\u002Fstrong> When most of the code was generated, “where did this come from and what is in it” is no longer obvious. Provenance plus a software bill of materials makes it answerable on demand, which is also what regulated work needs (see <a href=\"#appendix-g\">Appendix G<\u002Fa>).<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"body mkrow\" style=\"margin-top:11px;\"><span class=\"mk\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan>GitHub Artifact Attestations, built on Sigstore for keyless signing, producing a SLSA provenance record, with a software bill of materials from a tool like syft.<\u002Fp>\n\n    <div class=\"note\" style=\"margin-top:12px;\">\n      The half of this gate people skip is verification. <span class=\"nt\">Generating provenance and never checking it is worthless.<\u002Fspan> The value lands at the deploy gate, where an artifact without valid provenance is refused.\n    <\u002Fdiv>\n\n    <div class=\"gcard\" style=\"margin-top:13px;\">\n      <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge practice\">PRACTICE<\u002Fspan><\u002Fspan><p><span class=\"chip\">gh attestation verify<\u002Fspan>, or the Sigstore policy controller as an admission check on Kubernetes.<\u002Fp>\n      <span class=\"gl\">Good<\u002Fspan><p>Every released artifact has provenance and a bill of materials, and the deploy gate refuses anything unverified.<\u002Fp>\n      <span class=\"gl\" style=\"padding-top:2px;\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan><p>Attesting on the way out and never verifying on the way in.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">20<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 21 · 3.10 ENFORCEMENT ============ -->\n<div class=\"page\" id=\"310-enforcement\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.10 &nbsp;ENFORCEMENT<\u002Fdiv>\n    <h1 class=\"h1 mkrow\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan>Gates That Actually Block<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:14px;\">A gate that does not block is decoration. The mechanic: no merge to the default branch while a required gate is red, and the rule applies to everyone, admins and agents included. Configure your host’s branch protection so the gates above are required checks, add merge protection that blocks a pull request introducing high-severity scanner findings, and require mutation and provenance on high-risk or release branches.<\u002Fp>\n\n    <div class=\"note\" style=\"margin-top:14px;\">\n      <span class=\"nt\">The required human approver must be a person, and not the one who merely prompted the agent.<\u002Fspan> The approver signs off on the spec and the evidence, not on having typed the prompt.\n    <\u002Fdiv>\n\n    <div class=\"note viol mkrow\" style=\"margin-top:14px;\"><span class=\"mk\"><span class=\"badge violation\">VIOLATION<\u002Fspan><\u002Fspan>\n      <span class=\"nt\">An “AI fast-path” that skips review for agent pull requests because the tests passed.<\u002Fspan> That is the collapse at the level of process. Agent work gets more scrutiny on the residual, not less.\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;display:flex;gap:5px;\"><span style=\"width:36px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:36px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:36px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fdiv>\n    <p class=\"body\" style=\"font-size:12px;color:#857c70;margin-top:10px;\">Branch protection is where every preceding gate becomes real. Until a red gate stops a merge, the whole judiciary is advice.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">21<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 22 · 3.11 COST OF THE DEFENSE ============ -->\n<div class=\"page\" id=\"311-cost\" style=\"--accent:#7B1818;--rule:#A14242;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE JUDICIARY<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">3.11 &nbsp;THE COST OF THE DEFENSE<\u002Fdiv>\n    <h1 class=\"h1 sm\">Match the Cost of Checking to the Cost of Being Wrong<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:13px;\">Verification is not free. Mutation testing, multi-model review, and full gate suites on every change cost time and money, and running the strongest model on every task is the largest hidden bill in an AI-first pipeline. Spend your verification budget in proportion to the blast radius, using the same three tiers as the rest of the playbook. The numbers below are order-of-magnitude and will change. The principle will not.<\u002Fp>\n\n    <div style=\"margin-top:13px;\">\n      <table class=\"tbl\" style=\"font-size:11px;\">\n        <thead><tr><th style=\"width:22%;\">Gate or move<\u002Fth><th style=\"width:24%;\">Typical cost<\u002Fth><th style=\"width:27%;\">Worth it when<\u002Fth><th>Theater when<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Lint, type check<\u002Fstrong><\u002Ftd><td>Seconds, near zero<\u002Ftd><td>Always. The cheapest checks that exist.<\u002Ftd><td>Never skip them.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Tests + diff coverage<\u002Fstrong><\u002Ftd><td>One to three minutes<\u002Ftd><td>Always. This is the oracle gate.<\u002Ftd><td>Gating on repo-wide coverage instead of the diff.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Mutation testing<\u002Fstrong><\u002Ftd><td>Two to five minutes on changed files, much longer on a whole repo<\u002Ftd><td>High-risk and changed code, run on the diff or nightly.<\u002Ftd><td>Running it on prototypes, cosmetic code, or the whole repo on every push.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Static, dependency, secret scans<\u002Fstrong><\u002Ftd><td>Seconds to minutes, deterministic<\u002Ftd><td>Always. No model cost.<\u002Ftd><td>Dismissing findings in bulk to clear the board.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Multi-model verification<\u002Fstrong> (the diversity tax)<\u002Ftd><td>Roughly doubles the inference cost of the verification step only, not the whole pipeline<\u002Ftd><td>High-risk paths, where a missed bug is expensive.<\u002Ftd><td>Cosmetic or throwaway code, where a second model is spend for show.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Strongest model on every task<\u002Fstrong><\u002Ftd><td>The biggest hidden cost in the pipeline<\u002Ftd><td>Hard planning, hard implementation, judiciary work.<\u002Ftd><td>Trivial edits and boilerplate, where a cheaper model is fine.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Build provenance<\u002Fstrong><\u002Ftd><td>Seconds<\u002Ftd><td>Released and regulated artifacts.<\u002Ftd><td>The waste is generating it and never verifying it.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <p class=\"body\" style=\"margin-top:13px;\"><strong>The diversity tax, concretely.<\u002Fstrong> Verifying with a second model adds roughly the cost of one extra inference pass over the verified slice, the tests and the review, not over the whole codebase. On a high-risk change that is a small price against a production incident. On a cosmetic change it is pure overhead, so drop it there. Tie the cost tier to the risk tier: high-risk pays the full tax, standard pays it on review only, cosmetic pays none.<\u002Fp>\n\n    <div class=\"note mkrow\" style=\"margin-top:11px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan>\n      <span class=\"nt\">Budgeting rule.<\u002Fspan> Set the verification spend by risk tier, not by habit. The same table that sets coverage and mutation thresholds (<a href=\"#33-gate-2\">§3.3<\u002Fa>) sets how many models touch a change and how strong they are.\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;border-top:1px solid #ECE7DD;padding-top:12px;\">\n      <p class=\"body\" style=\"font-size:12px;color:#857c70;\"><span class=\"lab\" style=\"letter-spacing:.1em;color:#7B1818;\">REFERENCES<\u002Fspan> &nbsp;·&nbsp; <a href=\"#appendix-f\">Appendix F<\u002Fa>, Part III. Config index in <a href=\"#appendix-a\">Appendix A<\u002Fa>.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 3 · The Quality Gates<\u002Fspan><span class=\"pg\">22<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 23 · PART IV DIVIDER + LIFECYCLE ============ -->\n<div class=\"page\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">THE CYCLE<\u002Fspan><\u002Fdiv>\n\n    <div style=\"margin-top:30px;display:flex;align-items:baseline;gap:16px;\">\n      <span style=\"font-family:'Libre Baskerville',serif;font-style:italic;font-size:15px;color:#4A4540;\">Part IV<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#E0DACE;\"><\u002Fspan>\n      <span style=\"display:flex;gap:5px;\"><span style=\"width:26px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:26px;height:3px;background:#7B1818;\"><\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Libre Baskerville',serif;font-weight:700;font-size:42px;line-height:1.04;color:#211C16;margin:14px 0 0;letter-spacing:-.02em;\">The Cycle — The Eight Stages<\u002Fh1>\n\n    <p class=\"lead\" style=\"margin-top:20px;max-width:600px;\">These eight stages are the software lifecycle, run in sequence. Each one moves the work a step further: understand the need, write it down, plan it, build it, verify it, review it, ship it, and operate it, with what you learn in production feeding back to the start.<\u002Fp>\n    <p class=\"body\" style=\"margin-top:12px;max-width:600px;\">Run them in order. You can repeat a stage, since specs iterate, but you do not skip ahead to the code, because that is where work stalls. Two chapters come before the stages: read <a href=\"#stage-zero\">Stage Zero<\u002Fa> if you are adding this to an existing codebase, and <a href=\"#orchestration-loop\">The Orchestration Loop<\u002Fa> if you are wiring up the agents.<\u002Fp>\n\n    <!-- lifecycle flow -->\n    <div style=\"margin-top:40px;\" data-om-raster=\"\">\n      <div style=\"position:relative;display:flex;justify-content:space-between;align-items:flex-start;\">\n        <div style=\"position:absolute;top:17px;left:5%;right:5%;height:2px;background:#E0DACE;\"><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#9C7A2E;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">1<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;letter-spacing:.02em;\">Discovery<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#9C7A2E;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">2<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Spec<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#4D5159;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">3<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Plan<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#4D5159;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">4<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Build<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#7B1818;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">5<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Verify<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#7B1818;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">6<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Review<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#4D5159;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">7<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Ship<\u002Fspan><\u002Fdiv>\n        <div style=\"position:relative;display:flex;flex-direction:column;align-items:center;width:74px;\"><div style=\"width:36px;height:36px;border-radius:50%;background:#7B1818;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:16px;\">8<\u002Fdiv><span class=\"lab\" style=\"font-size:10px;margin-top:8px;color:#3A332C;\">Observe<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;display:flex;align-items:center;gap:10px;justify-content:center;\">\n        <span style=\"flex:1;border-top:1.5px dashed #C9B98F;\"><\u002Fspan>\n        <span class=\"lab\" style=\"font-size:10.5px;color:#9C7A2E;letter-spacing:.06em;white-space:nowrap;\">feedback re-enters Stage 1 &amp; 2<\u002Fspan>\n        <span style=\"flex:1;border-top:1.5px dashed #C9B98F;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;padding-top:14px;border-top:1px solid #E0DACE;display:flex;gap:22px;flex-wrap:wrap;justify-content:center;font-size:11px;color:#6E655A;\">\n        <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#9C7A2E;\"><\u002Fspan>Legislative<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#4D5159;\"><\u002Fspan>Executive<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#7B1818;\"><\u002Fspan>Judiciary<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:auto;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Part IV · The Cycle<\u002Fspan><span class=\"pg\">23<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 24 · STAGE ZERO (1) ============ -->\n<div class=\"page\" id=\"stage-zero\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">ALL BRANCHES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">STAGE ZERO<\u002Fdiv>\n    <h1 class=\"h1\">Adopting SDD in an Existing Codebase<\u002Fh1>\n    <div style=\"margin-top:12px;display:flex;gap:6px;align-items:center;\"><span style=\"width:22px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:22px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:22px;height:3px;background:#7B1818;\"><\u002Fspan><span class=\"lab\" style=\"font-size:10px;color:#857c70;margin-left:6px;letter-spacing:.08em;\">BRANCH: ALL THREE, INTRODUCED GRADUALLY<\u002Fspan><\u002Fdiv>\n\n    <p class=\"lead\">Most teams do not start clean. The realistic starting point is a microservices codebase with some tests and no spec-driven process at all. The mistake is trying to spec the whole system before shipping anything. Adopt the process at the boundary of new work and let it spread service by service.<\u002Fp>\n\n    <div class=\"sec\" style=\"margin-top:16px;\">\n      <div class=\"seclabel\">THE PRINCIPLE<\u002Fdiv>\n      <p class=\"body\">New and changed code is held to the full process. Existing code is left alone until you touch it. This is the same idea as gating coverage on the diff rather than the whole repo: you raise the bar on what changes, not on history.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"sec\" style=\"margin-top:16px;\">\n      <div class=\"seclabel\">THE STEPS<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px 26px;\">\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">1<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Pick one service and one upcoming change.<\u002Fstrong> Adopt the process for the next feature in a single service, not across the whole estate.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">2<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Write the constitution from what you already do.<\u002Fstrong> Extract the conventions the team already follows (<a href=\"#appendix-b\">Appendix B<\u002Fa>). Do not invent new rules at adoption time. Capture the real ones first.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">3<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Add an <span class=\"chip\">AGENTS.md<\u002Fspan> to that service.<\u002Fstrong> Commands, version constraints, and non-standard patterns (<a href=\"#appendix-d\">Appendix D<\u002Fa>). One per service, since microservices differ.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">4<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Stand up the gates in report-only mode, then ratchet.<\u002Fstrong> Report but do not block, so legacy debt does not wall off every merge on day one. Then switch to blocking, but only on new and changed code.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">5<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Write the spec going forward, not backward.<\u002Fstrong> Spec the new feature first. Do not backfill all of history. For the one module you must change, reconstruct a spec for that module only (<a href=\"#appendix-h\">Appendix H<\u002Fa>, H.6).<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">6<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Pin legacy behavior before you change it.<\u002Fstrong> Write characterization tests that capture current behavior. These are your independent oracle for legacy code, since the original intent was never written down.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">7<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Introduce model diversity at review first.<\u002Fstrong> The cheapest entry point for the judiciary is a review agent on a different model family. Add separate-model test authoring next.<\u002Fp><\u002Fdiv>\n        <div style=\"display:flex;gap:10px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">8<\u002Fspan><p class=\"body\" style=\"font-size:12px;\"><strong>Expand service by service.<\u002Fstrong> Each service gets its own <span class=\"chip\">AGENTS.md<\u002Fspan>, then specs accrue as features land. The estate converges over quarters, not in one migration.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Stage Zero<\u002Fspan><span class=\"pg\">24<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 25 · STAGE ZERO (2) ============ -->\n<div class=\"page\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">ALL BRANCHES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">STAGE ZERO · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">A Realistic Ratchet<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:18px;\">\n      <table class=\"tbl\">\n        <thead><tr><th style=\"width:18%;\">Horizon<\u002Fth><th>What is in place<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Week 1<\u002Fstrong><\u002Ftd><td>One service has a constitution and <span class=\"chip\">AGENTS.md<\u002Fspan>. Gates run in report-only mode.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Month 1<\u002Fstrong><\u002Ftd><td>Gates block on new and changed code in that service. The first feature ships with a real spec and spec-derived tests. Review runs on a second model.<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Quarter 1<\u002Fstrong><\u002Ftd><td>Two or three services on the process. Characterization tests cover the legacy paths you have touched. Mutation testing on high-risk changes.<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"note\" style=\"margin-top:22px;\">\n      <span class=\"nt\">Handling flaky tests.<\u002Fspan> A flaky gate is a broken check, and in a brownfield repo you will have some. Quarantine flaky tests out of the blocking set immediately, then fix or delete them. Do not gate merges on a test that fails at random, and do not let “the suite is flaky” become the excuse that the whole process gets ignored.\n    <\u002Fdiv>\n\n    <div class=\"anti\">\n      <div class=\"antilabel\">ANTI-PATTERNS<\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Boiling the ocean.<\u002Fem> Trying to spec the entire monolith or every service before shipping anything.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Blocking on legacy debt.<\u002Fem> Turning gates to blocking across all existing code on day one, which walls off every merge and kills adoption.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Rewriting working code to fit the process.<\u002Fem> The process is for the change you were going to make anyway, not a reason to churn stable code.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Stage Zero<\u002Fspan><span class=\"pg\">25<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 26 · ORCHESTRATION (1) ============ -->\n<div class=\"page\" id=\"orchestration-loop\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">ALL BRANCHES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">THE ORCHESTRATION LOOP<\u002Fdiv>\n    <h1 class=\"h1\">One Feature, Three Branches<\u002Fh1>\n    <div style=\"margin-top:12px;display:flex;gap:6px;align-items:center;\"><span style=\"width:22px;height:3px;background:#9C7A2E;\"><\u002Fspan><span style=\"width:22px;height:3px;background:#4D5159;\"><\u002Fspan><span style=\"width:22px;height:3px;background:#7B1818;\"><\u002Fspan><span class=\"lab\" style=\"font-size:10px;color:#857c70;margin-left:6px;letter-spacing:.08em;\">BRANCH: ALL THREE, WORKING TOGETHER<\u002Fspan><\u002Fdiv>\n\n    <p class=\"lead\">The stages tell you what each step must achieve. This chapter shows the agents doing those steps together: who hands what to whom, where the model changes, and where context is reset. It is the part most teams are missing, because the hard part of AI-first work is not knowing what to do, it is making a squad of agents do it well without their context decaying or their powers fusing.<\u002Fp>\n    <p class=\"body\" style=\"margin-top:11px;\">The loop is one feature moving through the three branches, with the agents named and the model switches marked. The concrete setup here is GitHub Copilot, whose coding agent and custom sub-agents act as the executive, combined with Spec Kit, whose slash-commands drive the legislative and planning work. Any equivalent tools map the same way. The branches are what matter.<\u002Fp>\n\n    <div class=\"sec\" style=\"margin-top:16px;\">\n      <div class=\"seclabel\">THE CAST — EACH AGENT HAS ONE JOB AND BELONGS TO ONE BRANCH<\u002Fdiv>\n      <table class=\"tbl\" style=\"font-size:11.5px;\">\n        <thead><tr><th style=\"width:21%;\">Agent<\u002Fth><th style=\"width:15%;\">Branch<\u002Fth><th style=\"width:25%;\">Model choice<\u002Fth><th>Job<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><strong>Spec agent<\u002Fstrong><\u002Ftd><td style=\"color:#9C7A2E;\">Legislative<\u002Ftd><td>Strong reasoning model<\u002Ftd><td>Drafts the EARS spec from the human’s intent<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Clarifier<\u002Fstrong><\u002Ftd><td style=\"color:#9C7A2E;\">Legislative<\u002Ftd><td>Strong reasoning model<\u002Ftd><td>Hunts ambiguity, asks the human, writes answers back<\u002Ftd><\u002Ftr>\n          <tr><td><strong><span class=\"lab\">Tester<\u002Fspan><\u002Fstrong><\u002Ftd><td style=\"color:#7B1818;\">Judiciary<\u002Ftd><td>A different model, call it Model B<\u002Ftd><td>Writes the oracle tests from the spec only, never reads the code first (Phase A)<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Planner &amp; decomposer<\u002Fstrong><\u002Ftd><td style=\"color:#4D5159;\">Executive<\u002Ftd><td>Strong reasoning model<\u002Ftd><td>Produces the plan and task list, checks against the constitution<\u002Ftd><\u002Ftr>\n          <tr><td><strong><span class=\"lab\">Coder<\u002Fspan><\u002Fstrong><\u002Ftd><td style=\"color:#4D5159;\">Executive<\u002Ftd><td>A capable coding model, call it Model A<\u002Ftd><td>Implements the tasks (Phase B)<\u002Ftd><\u002Ftr>\n          <tr><td><strong>Reviewer<\u002Fstrong><\u002Ftd><td style=\"color:#7B1818;\">Judiciary<\u002Ftd><td>A different family from Model A, B or diverse<\u002Ftd><td>Reviews the residual: intent, architecture, security design<\u002Ftd><\u002Ftr>\n          <tr><td><strong>CI gates<\u002Fstrong><\u002Ftd><td style=\"color:#7B1818;\">Judiciary<\u002Ftd><td>None, deterministic<\u002Ftd><td>The checks no model can argue with<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"note mkrow\" style=\"margin-top:14px;\"><span class=\"mk\"><span class=\"badge law\">LAW<\u002Fspan><\u002Fspan>\n      <span class=\"nt\">The model-switch rule.<\u002Fspan> The model that writes the code (Model A) must not be the only model that verifies it. The test author and the reviewer run on a different model, ideally a different family, so their blind spots do not line up. The planner and clarifier can share a model with the coder. The judiciary cannot. This is the orchestration-level form of the model-diversity rule from <a href=\"#stage-5\">Stage 5<\u002Fa>.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">The Orchestration Loop<\u002Fspan><span class=\"pg\">26<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 27 · ORCHESTRATION (2) THE PIPELINE ============ -->\n<div class=\"page\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">ALL BRANCHES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">THE ORCHESTRATION LOOP<\u002Fdiv>\n    <h1 class=\"h1 sm\">Each Artifact Is a Context Boundary<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:13px;\">Each branch hands the next a committed artifact, and each artifact is a context boundary. Do not carry one long conversation across the whole feature. Start a fresh session at each handoff and reload the constitution, the relevant <span class=\"chip\">AGENTS.md<\u002Fspan>, and the artifact you are acting on. This is what keeps quality from decaying as the context fills.<\u002Fp>\n\n    <!-- pipeline -->\n    <div style=\"margin-top:30px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);\">The handoffs<\u002Fdiv>\n    <div style=\"margin-top:13px;display:flex;flex-direction:column;gap:0;\" data-om-raster=\"\">\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;flex-direction:column;align-items:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#9C7A2E;\">LEGISLATIVE<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#9C7A2E;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#9C7A2E;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\">intent → <span class=\"chip\">/speckit.specify<\u002Fspan> → <span class=\"chip\">spec.md<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#9C7A2E;\">LEGISLATIVE<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#9C7A2E;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#9C7A2E;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.clarify<\u002Fspan> · refines the law · human approves<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#7B1818;\">JUDICIARY<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#7B1818;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#7B1818;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.custom.tests.specify<\u002Fspan> → <span class=\"chip\">tests.md<\u002Fspan><br><span style=\"color:#857c70;font-size:11px;\">TEST_AGENT · Model B · reads spec.md only<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#4D5159;\">EXECUTIVE<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#4D5159;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#4D5159;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.plan<\u002Fspan> → <span class=\"chip\">plan.md<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#7B1818;\">JUDICIARY<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#7B1818;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#7B1818;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.checklist<\u002Fspan> · validates spec ↔ plan consistency<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#4D5159;\">EXECUTIVE<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#4D5159;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#4D5159;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.tasks<\u002Fspan> → Phase A <span class=\"lab\" style=\"font-size:11px;\">T-test-&lt;ID&gt;<\u002Fspan> · Phase B <span class=\"lab\" style=\"font-size:11px;\">T-impl-&lt;ID&gt;<\u002Fspan><br><span style=\"color:#857c70;font-size:11px;\">Phase A tasks owned by TEST_AGENT, Phase B by CODER_AGENT<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#7B1818;\">JUDICIARY<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#7B1818;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#7B1818;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.analyze<\u002Fspan> · <span class=\"chip\">/speckit.custom.tests.gaps<\u002Fspan> · every requirement has a test<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#4D5159;\">EXECUTIVE<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#4D5159;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#4D5159;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\"><span class=\"chip\">/speckit.implement<\u002Fspan> · Phase A → <span class=\"lab\" style=\"font-size:11px;\">tests/**<\u002Fspan> · Phase B → <span class=\"lab\" style=\"font-size:11px;\">src/**<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span class=\"lab\" style=\"font-size:9px;letter-spacing:.1em;color:#7B1818;\">JUDICIARY<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:#7B1818;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;background:#7B1818;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 14px 16px;\"><p class=\"body\" style=\"font-size:12px;\">CI gates (deterministic, merge-blocking) · mutation · provenance · human approval<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:flex;gap:14px;align-items:stretch;\"><div style=\"width:84px;flex:none;display:flex;justify-content:flex-end;\"><span style=\"font-size:13px;color:#9C7A2E;\">↻<\u002Fspan><\u002Fdiv><div style=\"width:2px;background:transparent;flex:none;position:relative;\"><span style=\"position:absolute;left:-4px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid #9C7A2E;background:#FCFBF8;\"><\u002Fspan><\u002Fdiv><div style=\"padding:0 0 0 16px;\"><p class=\"body\" style=\"font-size:12px;\">merge → release → observe · <span style=\"color:#9C7A2E;\">feedback re-enters the legislature<\u002Fspan><\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">The Orchestration Loop<\u002Fspan><span class=\"pg\">27<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 28 · ORCHESTRATION (3) WORKED SEQUENCE ============ -->\n<div class=\"page\" style=\"--accent:#4A4540;--rule:#93897B;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">ALL BRANCHES<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:36px;\">THE ORCHESTRATION LOOP · THE WORKED SEQUENCE<\u002Fdiv>\n    <h1 class=\"h1 sm\">A Single Feature, End to End<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:12px;\">For a single feature, using the Spec Kit preset in <a href=\"#appendix-i\">Appendix I<\u002Fa>:<\u002Fp>\n\n    <div style=\"margin-top:11px;display:flex;flex-direction:column;gap:9px;\">\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">1<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\">The human writes a one-paragraph intent. The spec agent runs <span class=\"chip\">/speckit.specify<\u002Fspan> to scaffold <span class=\"chip\">spec.md<\u002Fspan>, then <span class=\"chip\">/speckit.clarify<\u002Fspan> to surface unstated scope and edge cases. The human answers and approves. <em>Both commands legislative, human-signed at the end. New session.<\u002Fem><\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">2<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><span class=\"lab\">TEST_AGENT<\u002Fspan>, on a different model family than the coder, runs <span class=\"chip\">/speckit.custom.tests.specify<\u002Fspan>. It reads <span class=\"chip\">spec.md<\u002Fspan> only, with <span class=\"chip\">plan.md<\u002Fspan> and all source as forbidden reads, and writes the oracle <span class=\"chip\">tests.md<\u002Fspan>. Reading the implementation would bias the oracle, so it is structurally blocked from doing so. <em>Judiciary. New session.<\u002Fem><\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">3<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\">The planner runs <span class=\"chip\">/speckit.plan<\u002Fspan> with the stack and constraints. <em>Executive.<\u002Fem> Then <span class=\"chip\">/speckit.checklist<\u002Fspan> cross-checks the plan against the spec. <em>Judiciary's first pass over an executive artefact. New session.<\u002Fem><\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">4<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><span class=\"chip\">/speckit.tasks<\u002Fspan> decomposes the work into Phase A test tasks owned by <span class=\"lab\">Coder<\u002Fspan> and Phase B implementation tasks owned by <span class=\"lab\">CODER_AGENT<\u002Fspan> that depend on Phase A. <em>Executive planning, with judicial ownership tags on the Phase A tasks.<\u002Fem> <span class=\"chip\">/speckit.analyze<\u002Fspan> and <span class=\"chip\">/speckit.custom.tests.gaps<\u002Fspan> then confirm every requirement has a matching test before any code is written. <em>Judiciary.<\u002Fem><\u002Fp><\u002Fdiv>\n      <div style=\"display:flex;gap:11px;\"><span class=\"lab\" style=\"color:#4A4540;font-weight:600;flex:none;font-size:12px;\">5<\u002Fspan><p class=\"body\" style=\"font-size:12.5px;\"><span class=\"chip\">/speckit.implement<\u002Fspan> dispatches Phase A to <span class=\"lab\">Tester<\u002Fspan> and Phase B to <span class=\"lab\">Coder<\u002Fspan> (Model A), which opens the pull request. <em>Executive.<\u002Fem> The CI gates, mutation on high-risk paths, and a review agent on a different family run. <em>Judiciary;<\u002Fem> the human approves on the evidence and the residual; then merge, release with provenance, and observe. Production signal becomes new intent and re-enters step 1.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"note\" style=\"margin-top:14px;\">\n      <span class=\"nt\">Configuring the squad.<\u002Fspan> In GitHub Copilot, sub-agents are defined with their own instructions and tool access, and <span class=\"chip\">AGENTS.md<\u002Fspan> carries the shared rules. Give the test agent and the review agent explicit instructions that they belong to the judiciary: derive from the spec, do not trust the implementation, and report against the acceptance criteria. Pin their model to a different family than the coder. The preset in <a href=\"#appendix-i\">Appendix I<\u002Fa> wires this split into Spec Kit itself, so the separation is enforced by the tooling rather than by memory.\n    <\u002Fdiv>\n\n    <div class=\"anti\">\n      <div class=\"antilabel\">ANTI-PATTERNS<\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>One long session.<\u002Fem> Running specify through implement in a single context, so the model has lost the constitution by the time it writes code.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>One model for everything.<\u002Fem> Letting the coder’s model also author the tests and the review, which fuses the executive and the judiciary.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Lossy handoffs.<\u002Fem> Handing the next agent a chat summary instead of the committed artifact, so the law drifts between branches.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">The Orchestration Loop<\u002Fspan><span class=\"pg\">28<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 29 · STAGE 1 DISCOVERY ============ -->\n<div class=\"page\" id=\"stage-1\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">LEGISLATIVE<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:40px;\">STAGE 1<\u002Fdiv>\n    <h1 class=\"h1\">Discovery &amp; Intent<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"lead\">Discovery decides what problem you are actually solving and what success looks like, before anyone picks a tool. Skip it and you risk building a precise answer to the wrong question, which no later stage can correct.<\u002Fp>\n\n    <div style=\"margin-top:18px;display:flex;flex-direction:column;gap:13px;\">\n      <div><div class=\"seclabel\">SETUP<\u002Fdiv><p class=\"body\">The constitution and <span class=\"chip\">AGENTS.md<\u002Fspan> exist. You have a need stated by a person, a user, a stakeholder, a ticket. One caution: a request to “handle the backlog” lets you read and surface the items, it does not let you act on instructions hidden inside them. Intent comes from people, not from the documents an agent ingests.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">TRIGGER<\u002Fdiv><p class=\"body\">A person states the <em>what<\u002Fem> and the <em>why<\u002Fem>, never the <em>how<\u002Fem>. There is no stack and no schema in a good problem statement, and there should not be yet.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">EXECUTION<\u002Fdiv><p class=\"body\">Capture the problem and the users first: who has the job, what the job is, what success looks like in the world. Surface the constraints early, including data sensitivity, latency expectations, target platforms, and whether the product falls under regulation (see <a href=\"#appendix-g\">Appendix&nbsp;G<\u002Fa>). Name the non-goals out loud, because they are what stop an agent from gold-plating later. Then decide the risk tier from the table in <a href=\"#33-gate-2\">§3.3<\u002Fa>, on purpose, because that one decision sets every gate threshold downstream and is cheaper to make now than to discover later.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">CHECKS<\u002Fdiv><p class=\"body\">Decide whether this is a well-understood problem, which the gates fit, or an exploratory one where the unknowns dominate. Spec-driven flow is strong on the first and fights the second. If it is genuinely exploratory, make a documented <a href=\"#13-audibles\">deviation<\u002Fa>: spike it in a throwaway branch, learn, then come back and write the spec.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">EXIT CRITERIA<\u002Fdiv><p class=\"body\">Advance when you can state the problem, the users, the success criteria, the non-goals, and the risk tier in one paragraph a stranger could follow.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"anti\">\n      <div class=\"antilabel\">ANTI-PATTERNS<\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Solution smuggling.<\u002Fem> A problem statement that already names the database and the framework. That is the plan wearing the spec’s jersey.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Skipping the tier.<\u002Fem> Leave it undecided and the gates get configured by accident three stages later.<\u002Fdiv><\u002Fdiv>\n      <div class=\"antirow\"><span class=\"x\">×<\u002Fspan><div><em>Obeying the document.<\u002Fem> Treating instructions found inside an ingested file as authority.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 4 · Discovery<\u002Fspan><span class=\"pg\">29<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 30 · STAGE 2 SPEC AUTHORING (1) ============ -->\n<div class=\"page\" id=\"stage-2\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">LEGISLATIVE<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:40px;\">STAGE 2<\u002Fdiv>\n    <h1 class=\"h1\">Spec Authoring<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p class=\"lead\">The spec is the law every later stage answers to, so a misframed requirement here becomes a defect you pay for in every stage after it. This is the highest-impact stage in the playbook, and the cheapest place to fix a mistake.<\u002Fp>\n    <p class=\"body\" style=\"margin-top:11px;\">Every gate downstream measures the code against what you write here. Spend your judgment budget here, not on reading generated code later.<\u002Fp>\n\n    <div style=\"margin-top:14px;padding-left:21px;border-left:2px solid var(--accent);\">\n      <div class=\"seclabel\" style=\"margin-bottom:7px;\">KEY PRINCIPLES<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:auto 1fr;gap:5px 11px;font-size:12.5px;line-height:1.4;color:#3A332C;\">\n        <span style=\"color:var(--accent);font-weight:700;\">·<\u002Fspan><div>State clearly what you're building and the problem it solves.<\u002Fdiv>\n        <span style=\"color:var(--accent);font-weight:700;\">·<\u002Fspan><div>Defer technology choices until after the spec is defined.<\u002Fdiv>\n        <span style=\"color:var(--accent);font-weight:700;\">·<\u002Fspan><div>Refine specifications through iteration before writing any code.<\u002Fdiv>\n        <span style=\"color:var(--accent);font-weight:700;\">·<\u002Fspan><div>Confirm requirements and the plan before implementation starts.<\u002Fdiv>\n        <span style=\"color:var(--accent);font-weight:700;\">·<\u002Fspan><div>Delegate the how to the coding agent.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:12px;\">\n      <div><div class=\"seclabel\">SETUP<\u002Fdiv><p class=\"body\">Stage 1 is complete and the constitution is loaded.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">TRIGGER<\u002Fdiv><p class=\"body\">A plain-language description of <em>what<\u002Fem> and <em>why<\u002Fem> becomes a structured spec. A toolkit like Spec Kit will scaffold this from a template, but the structure matters more than the tool.<\u002Fp><\u002Fdiv>\n      <div><div class=\"seclabel\">EXECUTION — THE FIVE EARS PATTERNS<\u002Fdiv>\n        <p class=\"body\" style=\"margin-bottom:9px;\">Write each requirement in EARS, the Easy Approach to Requirements Syntax, so every line is testable on its own.<\u002Fp>\n        <table class=\"tbl\" style=\"font-size:11.5px;\">\n          <thead><tr><th style=\"width:15%;\">Pattern<\u002Fth><th style=\"width:34%;\">Shape<\u002Fth><th>Example<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td><strong>Ubiquitous<\u002Fstrong><\u002Ftd><td>The system shall <span class=\"lab\">&lt;requirement&gt;<\u002Fspan>.<\u002Ftd><td>The system shall store each transaction with a timestamp.<\u002Ftd><\u002Ftr>\n            <tr><td><strong>Event-driven<\u002Fstrong><\u002Ftd><td><strong>When<\u002Fstrong> <span class=\"lab\">&lt;trigger&gt;<\u002Fspan>, the system shall <span class=\"lab\">&lt;response&gt;<\u002Fspan>.<\u002Ftd><td>When a withdrawal is requested, the system shall return the new balance within 500 ms at p95.<\u002Ftd><\u002Ftr>\n            <tr><td><strong>State-driven<\u002Fstrong><\u002Ftd><td><strong>While<\u002Fstrong> <span class=\"lab\">&lt;state&gt;<\u002Fspan>, the system shall <span class=\"lab\">&lt;behavior&gt;<\u002Fspan>.<\u002Ftd><td>While an account is frozen, the system shall reject every withdrawal.<\u002Ftd><\u002Ftr>\n            <tr><td><strong>Unwanted<\u002Fstrong><\u002Ftd><td><strong>If<\u002Fstrong> <span class=\"lab\">&lt;condition&gt;<\u002Fspan>, then the system shall <span class=\"lab\">&lt;response&gt;<\u002Fspan>.<\u002Ftd><td>If a withdrawal would take the balance below zero, then the system shall reject it.<\u002Ftd><\u002Ftr>\n            <tr><td><strong>Optional<\u002Fstrong><\u002Ftd><td><strong>Where<\u002Fstrong> <span class=\"lab\">&lt;feature present&gt;<\u002Fspan>, the system shall <span class=\"lab\">&lt;behavior&gt;<\u002Fspan>.<\u002Ftd><td>Where overdraft protection is enabled, the system shall cover the shortfall from the linked savings account.<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"body\" style=\"margin-top:auto;font-size:12px;color:#857c70;border-top:1px solid #ECE7DD;padding-top:11px;\">Continued — the four authoring rules, checks, and exit criteria follow.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ftr\"><span>Carlo Verzeri<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#9a9186;\">Ch 5 · Spec Authoring<\u002Fspan><span class=\"pg\">30<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ 31 · STAGE 2 SPEC AUTHORING (2) ============ -->\n<div class=\"page\" style=\"--accent:#9C7A2E;--rule:#B98E4C;\">\n  <div class=\"pad\">\n    <div class=\"hdr\"><span>The AI-First SDD Playbook<\u002Fspan><span class=\"br\">LEGISLATIVE<\u002Fspan><\u002Fdiv>\n    <div class=\"kick\" style=\"margin-top:40px;\">STAGE 2 · CONTINUED<\u002Fdiv>\n    <h1 class=\"h1 sm\">From Patterns to a Signed Spec<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n\n    <div style=\"margin-top:16px;\">\n      <div class=\"seclabel\">EXECUTION — THEN<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <div style=\"display:flex;gap:11px;\"><span style=\"color:#9C7A2E;flex:none;font-weight:700;
